<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iA Coach — Head Coach Virtual</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#43f320",
            "bg-dark": "#0d1a0b",
            "bg-card": "#111f0e",
            "bg-card2": "#162813",
          },
          fontFamily: {
            display: ["Syne", "sans-serif"],
            body: ["DM Sans", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    h1,h2,h3,h4,h5,h6,.font-display { font-family: 'Syne', sans-serif !important; }
    body { background: #0d1a0b; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1a0b; }
    ::-webkit-scrollbar-thumb { background: #2a4025; border-radius: 3px; }
    .glow { box-shadow: 0 0 20px rgba(67,243,32,0.15); }
    .glow-border { border: 1px solid rgba(67,243,32,0.35); box-shadow: 0 0 12px rgba(67,243,32,0.1); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes pulse-green { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .pulse-green { animation: pulse-green 2s infinite; }
    .nav-link { transition: all 0.2s; }
    .nav-link:hover { background: rgba(67,243,32,0.08); color: #43f320; }
    .nav-active { background: rgba(67,243,32,0.12); color: #43f320; }
    .btn-primary { background: #43f320; color: #0d1a0b; font-weight: 700; transition: all 0.2s; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-ghost { border: 1px solid rgba(67,243,32,0.3); color: #43f320; transition: all 0.2s; }
    .btn-ghost:hover { background: rgba(67,243,32,0.1); }
    .card { background: #111f0e; border: 1px solid rgba(67,243,32,0.08); border-radius: 12px; }
    .card-ai { background: #111f0e; border: 2px solid rgba(67,243,32,0.35); border-radius: 12px; box-shadow: 0 0 20px rgba(67,243,32,0.08); }
    input, select, textarea { background: #0d1a0b !important; border: 1px solid rgba(67,243,32,0.2) !important; color: #e2e8f0 !important; border-radius: 8px; padding: 10px 14px; width: 100%; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: rgba(67,243,32,0.6) !important; }
    select option { background: #0d1a0b; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .tag-green { background: rgba(67,243,32,0.15); color: #43f320; }
    .tag-red { background: rgba(239,68,68,0.15); color: #f87171; }
    .tag-yellow { background: rgba(234,179,8,0.15); color: #facc15; }
    .tag-blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .sidebar { width: 240px; min-width: 240px; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(67,243,32,0.2); border-top-color: #43f320; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wod-bar { background: rgba(67,243,32,0.1); border-radius: 4px; display: flex; align-items: flex-end; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #111f0e; border: 1px solid rgba(67,243,32,0.2); border-radius: 16px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 32px; }
    .progress-bar { height: 6px; background: rgba(67,243,32,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #43f320; border-radius: 3px; transition: width 0.5s ease; }
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #2a3828; border-radius: 24px; transition: 0.3s; }
    .toggle-slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle input:checked + .toggle-slider { background: #43f320; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #0d1a0b; }
    .gantt-bar { height: 28px; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 700; cursor: pointer; transition: filter 0.2s; }
    .gantt-bar:hover { filter: brightness(1.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ─── Supabase ──────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://bpmbwwfpjpvgamhuvwps.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwbWJ3d2ZwanB2Z2FtaHV2d3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjYwNjMsImV4cCI6MjA4NzcwMjA2M30.Em0hb-RsA6qMvBy8ftxMU0kDIFg7wVtfn6zwWsoSCyI';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ACADEMIA_ID = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';
    const COACH_ID = 'b1c2d3e4-f5a6-7890-abcd-ef1234567891';
    const DONO_ID = 'c2d3e4f5-a6b7-8901-bcde-f12345678902';

    // ─── Helpers ───────────────────────────────────────────────────────────────
    const hoje = () => new Date().toISOString().split('T')[0];
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'}) : '';
    const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const metLabels = { crossfit: 'CrossFit', hyrox: 'Hyrox', bootcamp: 'Bootcamp' };
    const intensidadeColor = { alta: 'tag-red', media: 'tag-yellow', baixa: 'tag-green' };

    // ─── Icons ─────────────────────────────────────────────────────────────────
    const Icon = ({ name, size = 20, className = '' }) => (
      <span className={`material-symbols-outlined ${className}`} style={{ fontSize: size, lineHeight: 1, userSelect: 'none' }}>{name}</span>
    );

    // ─── Loading ───────────────────────────────────────────────────────────────
    const Loading = () => (
      <div className="flex items-center justify-center h-48">
        <div className="loading-spinner" />
      </div>
    );

    // ─── Modal ─────────────────────────────────────────────────────────────────
    const Modal = ({ open, onClose, title, children }) => {
      if (!open) return null;
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-box fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-6">
              <h3 className="text-xl font-display font-bold">{title}</h3>
              <button onClick={onClose} className="p-1 hover:text-red-400 transition-colors"><Icon name="close" /></button>
            </div>
            {children}
          </div>
        </div>
      );
    };

    // ─── Toast ─────────────────────────────────────────────────────────────────
    const Toast = ({ msg, type, onClose }) => {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
      const bg = type === 'error' ? 'bg-red-900 border-red-600' : 'bg-bg-card glow-border';
      return (
        <div className={`fixed bottom-6 right-6 z-50 ${bg} border rounded-xl px-5 py-3 flex items-center gap-3 fade-in`} style={{maxWidth:340}}>
          <Icon name={type==='error'?'error':'check_circle'} className={type==='error'?'text-red-400':'text-primary'} />
          <span className="text-sm font-medium">{msg}</span>
          <button onClick={onClose} className="ml-2 opacity-60 hover:opacity-100"><Icon name="close" size={16}/></button>
        </div>
      );
    };

    // ─── Login Page ────────────────────────────────────────────────────────────
    const LoginPage = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true); setErr('');
        const { data, error } = await sb.from('usuarios').select('*').eq('email', email.trim()).single();
        if (error || !data) { setErr('E-mail não encontrado.'); setLoading(false); return; }
        onLogin(data);
        setLoading(false);
      };

      const quickLogin = async (perfil) => {
        setLoading(true); setErr('');
        try {
          const emailMap = { head_coach: 'coach@crossfititron.com', dono: 'dono@crossfititron.com' };
          const { data, error } = await sb.from('usuarios').select('*').eq('email', emailMap[perfil]).single();
          if (error || !data) { setErr('Usuário demo não encontrado. Verifique se o banco de dados está configurado.'); setLoading(false); return; }
          onLogin(data);
        } catch (e) {
          setErr('Erro ao conectar. Tente novamente.');
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{background:'#0d1a0b'}}>
          <div style={{maxWidth:960, width:'100%'}}>
            {/* Header */}
            <div className="text-center mb-12">
              <div className="flex items-center justify-center gap-3 mb-4">
                <div className="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                  <Icon name="bolt" className="text-bg-dark" size={22}/>
                </div>
                <span className="font-display text-3xl font-bold">iA Coach</span>
              </div>
              <p className="text-slate-400">Head Coach Virtual — Plataforma de Gestão Fitness com IA</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              {/* Login Form */}
              <div className="card p-8">
                <h2 className="font-display font-bold text-xl mb-6 flex items-center gap-2">
                  <Icon name="login" className="text-primary" />Acessar sua Conta
                </h2>
                <form onSubmit={handleLogin} className="space-y-4">
                  <div>
                    <label className="text-sm text-slate-400 mb-1 block">E-mail</label>
                    <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" required/>
                  </div>
                  <div>
                    <label className="text-sm text-slate-400 mb-1 block">Senha</label>
                    <input type="password" value={senha} onChange={e=>setSenha(e.target.value)} placeholder="••••••••"/>
                  </div>
                  {err && <p className="text-red-400 text-sm">{err}</p>}
                  <button type="submit" disabled={loading} className="btn-primary w-full py-3 rounded-xl mt-2 flex items-center justify-center gap-2">
                    {loading ? <div className="loading-spinner" style={{width:20,height:20,borderWidth:2}}/> : <><Icon name="login" size={18}/>Entrar na Plataforma</>}
                  </button>
                  <p className="text-center text-slate-500 text-xs">Acesso rápido para demo:</p>
                  <div className="grid grid-cols-2 gap-3">
                    <button type="button" onClick={()=>quickLogin('head_coach')} className="btn-ghost rounded-lg py-2 text-sm flex items-center justify-center gap-2">
                      <Icon name="sports_gymnastics" size={16}/>Head Coach
                    </button>
                    <button type="button" onClick={()=>quickLogin('dono')} className="btn-ghost rounded-lg py-2 text-sm flex items-center justify-center gap-2">
                      <Icon name="corporate_fare" size={16}/>Dono
                    </button>
                  </div>
                </form>
              </div>

              {/* Perfis */}
              <div className="space-y-4">
                <h3 className="font-display font-bold text-lg">Selecione seu perfil</h3>
                <div className="grid grid-cols-1 gap-4">
                  <div onClick={()=>quickLogin('head_coach')} className="card p-6 cursor-pointer hover:glow-border transition-all group">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
                        <Icon name="sports_gymnastics" className="text-primary" size={26}/>
                      </div>
                      <div className="flex-1">
                        <h4 className="font-display font-bold text-lg">Head Coach</h4>
                        <p className="text-slate-400 text-sm">Gere treinos, analise programações e gerencie periodização com IA.</p>
                      </div>
                      <Icon name="arrow_forward" className="text-slate-600 group-hover:text-primary transition-colors"/>
                    </div>
                  </div>
                  <div onClick={()=>quickLogin('dono')} className="card p-6 cursor-pointer hover:glow-border transition-all group">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
                        <Icon name="corporate_fare" className="text-primary" size={26}/>
                      </div>
                      <div className="flex-1">
                        <h4 className="font-display font-bold text-lg">Dono da Academia</h4>
                        <p className="text-slate-400 text-sm">Visão estratégica, métricas, benchmarking e gestão de coaches.</p>
                      </div>
                      <Icon name="arrow_forward" className="text-slate-600 group-hover:text-primary transition-colors"/>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── Sidebar ───────────────────────────────────────────────────────────────
    const Sidebar = ({ user, page, setPage, onLogout, academia }) => {
      const coachLinks = [
        { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
        { id: 'gerar', icon: 'auto_awesome', label: 'Gerar Treino' },
        { id: 'analise', icon: 'monitoring', label: 'Análise' },
        { id: 'periodizacao', icon: 'calendar_month', label: 'Periodização' },
        { id: 'seguranca', icon: 'verified_user', label: 'Segurança' },
      ];
      const donoLinks = [
        { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
        { id: 'estrategico', icon: 'insights', label: 'Visão Estratégica' },
        { id: 'coaches', icon: 'groups', label: 'Gestão Coaches' },
        { id: 'configuracoes', icon: 'settings', label: 'Configurações' },
      ];
      const links = user.perfil === 'head_coach' ? coachLinks : donoLinks;

      return (
        <aside className="sidebar flex flex-col border-r border-white/5 h-screen sticky top-0">
          <div className="p-5 flex items-center gap-3 border-b border-white/5">
            <div className="w-9 h-9 bg-primary rounded-lg flex items-center justify-center">
              <Icon name="bolt" className="text-bg-dark" size={20}/>
            </div>
            <div>
              <div className="font-display font-bold text-base leading-none">iA Coach</div>
              <div className="text-primary text-xs mt-0.5">{academia?.nome || 'CrossFit Iron'}</div>
            </div>
          </div>
          <nav className="flex-1 p-3 space-y-1 overflow-y-auto">
            {links.map(l => (
              <button key={l.id} onClick={() => setPage(l.id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium nav-link ${page===l.id?'nav-active':''}`}>
                <Icon name={l.icon} size={20}/>{l.label}
              </button>
            ))}
          </nav>
          <div className="p-3 border-t border-white/5">
            <div className="flex items-center gap-3 p-2 rounded-lg">
              <div className="w-9 h-9 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
                <Icon name="person" className="text-primary" size={18}/>
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold truncate">{user.nome}</p>
                <p className="text-xs text-slate-500">{user.perfil === 'head_coach' ? 'Head Coach' : 'Dono'}</p>
              </div>
              <button onClick={onLogout} className="p-1 text-slate-500 hover:text-red-400 transition-colors">
                <Icon name="logout" size={18}/>
              </button>
            </div>
          </div>
        </aside>
      );
    };

    // ─── Topbar ────────────────────────────────────────────────────────────────
    const Topbar = ({ title, subtitle, actions, alertCount }) => (
      <header className="flex items-center justify-between px-8 py-4 border-b border-white/5">
        <div>
          <h1 className="font-display font-bold text-2xl leading-tight">{title}</h1>
          {subtitle && <p className="text-slate-400 text-sm mt-0.5">{subtitle}</p>}
        </div>
        <div className="flex items-center gap-3">
          {alertCount > 0 && (
            <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
              <Icon name="warning" size={16}/>{alertCount} alerta{alertCount>1?'s':''}
            </div>
          )}
          {actions}
        </div>
      </header>
    );

    // ─── Dashboard Head Coach ──────────────────────────────────────────────────
    const DashboardCoach = ({ setPage, toast }) => {
      const [treinos, setTreinos] = useState([]);
      const [alertas, setAlertas] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const load = async () => {
          const [{ data: t }, { data: a }] = await Promise.all([
            sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID).order('data_treino', { ascending: false }).limit(7),
            sb.from('alertas_seguranca').select('*').eq('academia_id', ACADEMIA_ID).eq('resolvido', false),
          ]);
          setTreinos(t || []);
          setAlertas(a || []);
          setLoading(false);
        };
        load();
      }, []);

      const treino_hoje = treinos.find(t => t.data_treino === hoje());
      const semana = Array.from({length:7}, (_,i) => {
        const d = new Date(); d.setDate(d.getDate() - d.getDay() + i);
        const dateStr = d.toISOString().split('T')[0];
        return { dia: diasSemana[i], date: dateStr, treino: treinos.find(t => t.data_treino === dateStr) };
      });

      if (loading) return <Loading/>;
      return (
        <div className="p-8 space-y-6 fade-in">
          {/* Alerta banner */}
          {alertas.length > 0 && (
            <div className="flex items-start gap-4 p-4 rounded-xl bg-red-500/8 border border-red-500/20">
              <div className="w-10 h-10 rounded-lg bg-red-500 flex items-center justify-center shrink-0">
                <Icon name="warning" className="text-white" size={20}/>
              </div>
              <div className="flex-1">
                <p className="text-red-400 font-bold text-sm uppercase tracking-wide">Alerta de Segurança IA</p>
                <p className="text-slate-300 text-sm mt-1">{alertas[0].descricao}</p>
              </div>
              <button onClick={() => setPage('seguranca')} className="shrink-0 px-3 py-1.5 bg-red-500 text-white rounded-lg text-xs font-bold">
                Ver Detalhes
              </button>
            </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* WOD Hoje */}
            <div className="lg:col-span-2">
              {treino_hoje ? (
                <div className="card-ai p-6 h-full">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="tag tag-green">Treino de Hoje</span>
                    <span className="text-slate-400 text-xs">{fmtDate(treino_hoje.data_treino)}</span>
                  </div>
                  <h2 className="font-display font-bold text-3xl mb-4">{treino_hoje.nome || 'WOD do Dia'}</h2>
                  <div className="grid grid-cols-4 gap-3 mb-5 py-4 border-y border-white/5">
                    {[
                      {l:'Intensidade', v:treino_hoje.intensidade||'—', c:'text-primary'},
                      {l:'Duração', v:`${treino_hoje.tempo_previsto_min||'—'} min`},
                      {l:'Metodologia', v:metLabels[treino_hoje.metodologia]||'—'},
                      {l:'Alunos', v:treino_hoje.num_alunos||'—'},
                    ].map(({l,v,c}) => (
                      <div key={l}>
                        <p className="text-xs text-slate-500 uppercase font-bold tracking-tighter">{l}</p>
                        <p className={`font-bold mt-0.5 ${c||''}`}>{v}</p>
                      </div>
                    ))}
                  </div>
                  {treino_hoje.wod && (
                    <div className="space-y-2 mb-4">
                      <p className="text-sm font-bold text-primary">{treino_hoje.wod.formato}</p>
                      {(treino_hoje.wod.movimentos||[]).slice(0,3).map((m,i) => (
                        <div key={i} className="flex items-center gap-3 text-sm">
                          <span className="text-2xl font-display font-bold text-primary/30 w-8">{m.reps}</span>
                          <span className="font-medium">{m.nome}</span>
                          {m.carga && <span className="text-slate-500">{m.carga}</span>}
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="flex gap-3">
                    <button onClick={() => setPage('gerar')} className="btn-primary px-5 py-2.5 rounded-xl text-sm">Ver Treino Completo</button>
                    <button onClick={() => setPage('gerar')} className="btn-ghost px-5 py-2.5 rounded-xl text-sm">Editar WOD</button>
                  </div>
                </div>
              ) : (
                <div className="card-ai p-8 h-full flex flex-col items-center justify-center text-center">
                  <Icon name="fitness_center" className="text-primary/30" size={48}/>
                  <h3 className="font-display font-bold text-xl mt-4 mb-2">Nenhum treino hoje</h3>
                  <p className="text-slate-400 text-sm mb-5">Clique abaixo para gerar o treino do dia com IA</p>
                  <button onClick={() => setPage('gerar')} className="btn-primary px-6 py-3 rounded-xl flex items-center gap-2">
                    <Icon name="auto_awesome" size={18}/>Gerar Treino IA
                  </button>
                </div>
              )}
            </div>

            {/* Stats */}
            <div className="space-y-4">
              {[
                {l:'Check-ins Hoje', v:'84 / 120', i:'group'},

    };

    // ─── Gerar Treino ──────────────────────────────────────────────────────────
    const GerarTreino = ({ toast }) => {
      const [form, setForm] = useState({ metodologia: 'crossfit', data: hoje(), num_alunos: 15, foco: 'LPO + Condicionamento', restritcoes: '', modo_duplas: false });
      const [treino, setTreino] = useState(null);
      const [loading, setLoading] = useState(false);
      const [saved, setSaved] = useState(false);
      const [treinos, setTreinos] = useState([]);
      const [showList, setShowList] = useState(false);

      useEffect(() => {
        sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID).order('data_treino', {ascending:false}).limit(10)
          .then(({data}) => { setTreinos(data||[]); if(data&&data.length) setTreino(data[0]); });
      }, []);

      const wods = {
        crossfit: [
          {nome:'The Iron Lung', formato:'AMRAP 18 min', movimentos:[{nome:'Wall Ball Shots',reps:20,carga:'20/14 lbs'},{nome:'Box Jumps',reps:15,carga:'24/20in'},{nome:'Power Snatches',reps:10,carga:'95/65 lbs'}]},
          {nome:'Carbon',formato:'For Time',movimentos:[{nome:'Thrusters',reps:21,carga:'43/29kg'},{nome:'Pull-ups',reps:21,carga:''},{nome:'Thrusters',reps:15,carga:'43/29kg'}]},
          {nome:'Engine Day',formato:'3 Rounds',movimentos:[{nome:'500m Row',reps:1,carga:''},{nome:'15 Burpees',reps:15,carga:''},{nome:'400m Run',reps:1,carga:''}]},
        ],
        hyrox: [
          {nome:'Hyrox Sim',formato:'8 Stations',movimentos:[{nome:'1000m SkiErg',reps:1,carga:''},{nome:'50m Sled Push',reps:1,carga:'60/40kg'},{nome:'Sandbag Lunges',reps:100,carga:''}]},
        ],
        bootcamp: [
          {nome:'Team Burner',formato:'EMOM 20min',movimentos:[{nome:'Kettlebell Swings',reps:15,carga:'24kg'},{nome:'Push-ups',reps:10,carga:''},{nome:'Jumping Jacks',reps:30,carga:''}]},
        ],
      };

      const gerar = async () => {
        setLoading(true); setSaved(false);
        await new Promise(r => setTimeout(r, 1200));
        const wodOpts = wods[form.metodologia] || wods.crossfit;
        const wod = wodOpts[Math.floor(Math.random() * wodOpts.length)];
        const novo = {
          academia_id: ACADEMIA_ID, criado_por: COACH_ID,
          data_treino: form.data, metodologia: form.metodologia,
          nome: wod.nome, num_alunos: parseInt(form.num_alunos),
          foco: form.foco, restritcoes: form.restritcoes,
          modo_duplas: form.modo_duplas,
          aquecimento: { descricao: '3 rounds: 400m corrida + 10 Air Squats + mobilidade', duracao_min: 12 },
          skill: { nome: 'Front Squat', series: [{set:1,reps:5,pct:60},{set:2,reps:5,pct:70},{set:3,reps:3,pct:80}], duracao_min: 15 },
          wod, cooldown: { descricao: '5 min caminhada leve + Foam Roller' },
          adaptacoes: { iniciante: 'Reduza cargas 40% e substitua movimentos complexos', avancado: 'Mantenha RX + adicione colete 5kg' },
          tempo_previsto_min: Math.floor(Math.random()*15)+25,
          intensidade: form.foco.includes('Força')?'media':'alta',
          status: 'rascunho',
        };
        setTreino(novo); setLoading(false);
        toast('Treino gerado com IA! Revise e salve.', 'success');
      };

      const salvar = async () => {
        if (!treino) return;
        const { data, error } = await sb.from('treinos').insert([treino]).select().single();
        if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
        setSaved(true);
        setTreinos(prev => [data, ...prev]);
        setTreino(data);
        toast('Treino salvo com sucesso!', 'success');

      return (

              </div>
            </div>

            {[
              {l:'Data do Treino', k:'data', type:'date'},

                <input type={type} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph}/>

                <p className="text-slate-400 font-medium">Gerando treino com IA...</p>
              </div>

                <div className="flex items-start justify-between">

                    <span className="tag tag-green mb-2 inline-block">Resultado IA</span>
                    <h2 className="font-display font-bold text-3xl">{treino.nome}</h2>
                    <p className="text-slate-400 text-sm mt-1">{fmtDate(treino.data_treino)} · {metLabels[treino.metodologia]}</p>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={gerar} className="btn-ghost p-2.5 rounded-lg" title="Regenerar"><Icon name="refresh" size={18}/></button>

                    {saved && <span className="tag tag-green flex items-center gap-1"><Icon name="check" size={14}/>Salvo</span>}
                  </div>
                </div>

                {/* Aquecimento */}
                {treino.aquecimento && (
                  <div className="card-ai p-5">
                    <div className="flex items-center justify-between mb-3">
                      <div className="flex items-center gap-2"><Icon name="whatshot" className="text-orange-400" size={20}/><h3 className="font-display font-bold">Aquecimento</h3></div>
                      <span className="text-xs text-slate-400">{treino.aquecimento.duracao_min} min</span>
                    </div>
                    <p className="text-slate-300 text-sm">{treino.aquecimento.descricao}</p>
                  </div>
                )}

                {/* Skill */}
                {treino.skill && (
                  <div className="card p-5">
                    <div className="flex items-center justify-between mb-3">
                      <div className="flex items-center gap-2"><Icon name="fitness_center" className="text-primary" size={20}/><h3 className="font-display font-bold">Skill: {treino.skill.nome}</h3></div>
                      <span className="text-xs text-slate-400">{treino.skill.duracao_min} min</span>
                    </div>
                    <div className="grid grid-cols-4 gap-2">
                      {(treino.skill.series||[]).map((s,i) => (
                        <div key={i} className="bg-primary/5 border border-primary/10 rounded-lg p-3 text-center">
                          <p className="text-xs text-slate-400">Set {s.set}</p>
                          <p className="font-bold text-sm">{s.reps}@{s.pct}%</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* WOD */}
                {treino.wod && (
                  <div className="card-ai p-5 border-2">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-2">
                        <Icon name="timer" className="text-primary" size={24}/>

                          <h3 className="font-display font-bold text-xl">WOD: "{treino.wod.nome}"</h3>
                          <span className="text-primary text-xs font-bold">{treino.wod.formato}</span>

                      </div>
                      <div className="tag tag-green flex items-center gap-1">
                        <Icon name="bolt" size={12}/>TEMPO: {treino.tempo_previsto_min}min
                      </div>

                    <div className="space-y-3">
                      {(treino.wod.movimentos||[]).map((m,i) => (
                        <div key={i} className="flex items-center gap-4 border-b border-white/5 pb-3">
                          <span className="font-display font-bold text-3xl text-primary/25 w-12">{m.reps}</span>
                          <div>
                            <p className="font-bold">{m.nome}</p>
                            {m.carga && <p className="text-xs text-slate-400">{m.carga}</p>}
                          </div>
                        </div>
                      ))}
                    </div>
                    {form.modo_duplas && (
                      <div className="mt-4 p-3 rounded-lg bg-blue-500/10 border border-blue-500/20 flex items-center gap-2 text-sm text-blue-300">
                        <Icon name="group" size={16}/>Adaptado para duplas — alternar movimentos por round
                      </div>
                    )}
                  </div>
                )}

                {/* Cooldown + Adaptações */}
                <div className="grid grid-cols-2 gap-4">
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="self_improvement" className="text-primary" size={18}/><h3 className="font-bold text-sm">Cooldown</h3></div>
                    <p className="text-xs text-slate-400">{treino.cooldown?.descricao}</p>
                  </div>
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="tune" className="text-primary" size={18}/><h3 className="font-bold text-sm">Adaptações (Scaling)</h3></div>

                    <p className="text-xs text-slate-400"><span className="text-slate-200 font-bold">Avançado:</span> {treino.adaptacoes?.avancado}</p>
                  </div>
                </div>
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center h-full gap-3 text-center">
                <Icon name="auto_awesome" className="text-primary/20" size={64}/>
                <h3 className="font-display font-bold text-xl">Configure e gere seu treino</h3>
                <p className="text-slate-400 text-sm max-w-xs">Ajuste os parâmetros no painel à esquerda e clique em "Gerar com IA"</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ─── Análise de Programação ────────────────────────────────────────────────

                    <span className="text-sm font-medium w-20 text-slate-300">{l}</span>

                      <div className={`h-full flex items-center justify-end pr-2 rounded-full transition-all ${v>50?'bg-red-500/20 border-r-2 border-red-500':'bg-primary/25 border-r-2 border-primary'}`}
                        style={{width:`${(v/maxG)*100}%`}}>
                        <span className={`text-xs font-bold ${v>50?'text-red-400':'text-primary'}`}>{v}%</span>

                    <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(67,243,32,0.45)" strokeWidth="3" strokeDasharray="30 100" strokeDashoffset="-45" strokeLinecap="round"/>

                {i:'trending_up',t:'Expansão de Hyrox',d:'Demanda crescente às 18h. Aumentar grade em 20%.'},
                {i:'balance',t:'Rebalancear Programação',d:'Peso superou condicionamento nas últimas 3 semanas.'},
                {i:'group',t:'Campanha de Reengajamento',d:'23 alunos com padrão de evasão identificado.'},
                {i:'school',t:'Workshop de Movimento',d:'Skill técnico abaixo da média — sugestão de evento.'},
              ].map(({i,t,d}) => (
                <div key={t} className="flex gap-3 p-3 rounded-lg bg-bg-dark hover:bg-primary/5 transition-colors cursor-pointer">
                  <Icon name={i} className="text-primary shrink-0 mt-0.5" size={16}/>
                  <div>
                    <p className="text-sm font-bold">{t}</p>
                    <p className="text-xs text-slate-400 mt-0.5">{d}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // ─── Coaches ───────────────────────────────────────────────────────────────
    const Coaches = () => {
      const [usuarios, setUsuarios] = useState([]);
      useEffect(() => {
        sb.from('usuarios').select('*').eq('academia_id', ACADEMIA_ID)
          .then(({data}) => setUsuarios(data||[]));
      }, []);
      return (
        <div className="p-8 space-y-6 fade-in">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {usuarios.map(u => (
              <div key={u.id} className="card p-6">
                <div className="flex items-center gap-4 mb-5">
                  <div className="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
                    <Icon name="person" className="text-primary" size={22}/>
                  </div>
                  <div>
                    <h4 className="font-display font-bold text-lg">{u.nome}</h4>
                    <p className="text-sm text-slate-400">{u.email}</p>
                  </div>
                  <span className={`tag ml-auto ${u.perfil==='head_coach'?'tag-green':'tag-blue'}`}>
                    {u.perfil==='head_coach'?'Head Coach':'Dono'}
                  </span>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {[{l:'Treinos',v:'24'},{l:'Sugestões Aceitas',v:'78%'},{l:'Score IA',v:'8.7'}].map(({l,v}) => (
                    <div key={l} className="text-center p-3 rounded-lg bg-bg-dark">
                      <p className="font-display font-bold text-lg text-primary">{v}</p>
                      <p className="text-xs text-slate-400 mt-0.5">{l}</p>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── Configurações ─────────────────────────────────────────────────────────
    const Configuracoes = ({ toast }) => {
      const [academia, setAcademia] = useState(null);
      const [equipamentos, setEquipamentos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        Promise.all([
          sb.from('academias').select('*').eq('id', ACADEMIA_ID).single(),
          sb.from('equipamentos').select('*').eq('academia_id', ACADEMIA_ID),
        ]).then(([{data:a},{data:e}]) => { setAcademia(a); setEquipamentos(e||[]); setLoading(false); });
      }, []);

      const salvar = async () => {
        setSaving(true);
        await sb.from('academias').update({ nome: academia.nome, max_alunos_por_aula: academia.max_alunos_por_aula, dias_treino_semana: academia.dias_treino_semana }).eq('id', ACADEMIA_ID);
        setSaving(false);
        toast('Configurações salvas!','success');
      };

      if (loading) return <Loading/>;
      return (
        <div className="p-8 space-y-6 fade-in max-w-2xl">
          <div className="card p-6 space-y-4">
            <h3 className="font-display font-bold text-lg">Perfil da Academia</h3>
            <div><label className="text-sm text-slate-400 mb-1.5 block">Nome</label>
              <input value={academia?.nome||''} onChange={e=>setAcademia(a=>({...a,nome:e.target.value}))}/></div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="text-sm text-slate-400 mb-1.5 block">Máx. Alunos/Aula</label>
                <input type="number" value={academia?.max_alunos_por_aula||''} onChange={e=>setAcademia(a=>({...a,max_alunos_por_aula:parseInt(e.target.value)}))}/></div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Dias/Semana</label>
                <input type="number" value={academia?.dias_treino_semana||''} onChange={e=>setAcademia(a=>({...a,dias_treino_semana:parseInt(e.target.value)}))}/></div>
            </div>
            <button onClick={salvar} disabled={saving} className="btn-primary px-6 py-2.5 rounded-xl flex items-center gap-2 text-sm">
              {saving?<><div className="loading-spinner" style={{width:16,height:16,borderWidth:2}}/>Salvando...</>:<><Icon name="save" size={16}/>Salvar Alterações</>}
            </button>
          </div>

          <div className="card p-6">
            <h3 className="font-display font-bold text-lg mb-4">Equipamentos</h3>
            <div className="space-y-2">
              {equipamentos.map(eq => (
                <div key={eq.id} className="flex items-center justify-between p-3 rounded-lg bg-bg-dark">
                  <span className="text-sm font-medium">{eq.nome}</span>
                  <span className="tag tag-green">{eq.quantidade} unid.</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ─── App Root ──────────────────────────────────────────────────────────────
    const App = () => {
      const defaultUser = { id: COACH_ID, nome: 'Coach Demo', email: 'coach@crossfititron.com', perfil: 'head_coach', academia_id: ACADEMIA_ID };
      const [user, setUser] = useState(defaultUser);
      const [page, setPage] = useState('dashboard');
      const [academia, setAcademia] = useState(null);
      const [toastState, setToastState] = useState(null);
      const [alertCount, setAlertCount] = useState(0);

      const toast = (msg, type='success') => setToastState({msg, type, key: Date.now()});

      useEffect(() => {
        if (!user) return;
        sb.from('academias').select('*').eq('id', ACADEMIA_ID).single().then(({data}) => setAcademia(data));
        sb.from('alertas_seguranca').select('*',{count:'exact'}).eq('academia_id', ACADEMIA_ID).eq('resolvido',false)
          .then(({count}) => setAlertCount(count||0));
      }, [user]);

      useEffect(() => { setPage('dashboard'); }, [user]);

      const logout = () => { setUser(null); setPage('dashboard'); };

      if (!user) return null;

      const isCoach = user.perfil === 'head_coach';
      const pageMap = {
        dashboard: isCoach ? <DashboardCoach setPage={setPage} toast={toast}/> : <DashboardDono setPage={setPage}/>,
        gerar: <GerarTreino toast={toast}/>,
        analise: <Analise toast={toast}/>,
        periodizacao: <Periodizacao toast={toast}/>,
        seguranca: <Seguranca toast={toast}/>,
        estrategico: <Estrategico/>,
        coaches: <Coaches/>,
        configuracoes: <Configuracoes toast={toast}/>,
      };

      const titleMap = {
        dashboard: ['Dashboard', isCoach ? 'Visão geral do dia e performance' : 'Métricas e gestão da academia'],
        gerar: ['Gerar Treino', 'Inteligência artificial para criar sessões otimizadas'],
        analise: ['Análise de Programação', 'Estatísticas detalhadas da programação'],
        periodizacao: ['Periodização', 'Planejamento estratégico de macrociclos'],
        seguranca: ['Verificação de Segurança', 'Auditoria de segurança e riscos da semana'],
        estrategico: ['Visão Estratégica', 'Insights de IA para gestão do negócio'],
        coaches: ['Gestão de Coaches', 'Performance e métricas dos professores'],
        configuracoes: ['Configurações', 'Perfil e dados da academia'],
      };

      const [title, subtitle] = titleMap[page] || ['iA Coach',''];

      return (
        <div className="flex h-screen overflow-hidden">
          <Sidebar user={user} page={page} setPage={setPage} onLogout={logout} academia={academia}/>
          <div className="flex-1 flex flex-col overflow-hidden">
            <Topbar title={title} subtitle={subtitle} alertCount={isCoach ? alertCount : 0}/>
            <div className="flex-1 overflow-y-auto">
              {pageMap[page] || pageMap.dashboard}
            </div>
          </div>
          {toastState && <Toast key={toastState.key} msg={toastState.msg} type={toastState.type} onClose={() => setToastState(null)}/>}
          {isCoach && (
            <button onClick={() => setPage('gerar')} title="Gerar Novo Treino"
              className="fixed bottom-7 right-7 w-14 h-14 bg-primary text-bg-dark rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50"
              style={{boxShadow:'0 0 30px rgba(67,243,32,0.4)'}}>
              <Icon name="auto_awesome" size={24}/>
            </button>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
