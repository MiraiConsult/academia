                </div>
                <div className="flex gap-3 mt-2">
                  <button onClick={()=>setShowModal(false)} className="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 hover:text-white transition-colors">Cancelar</button>
                  <button onClick={salvarTurma} className="flex-1 btn-primary py-2.5 rounded-xl">{editItem?'Salvar Alterações':'Criar Turma'}</button>
                </div>
              </div>
            ) : (
              <div className="space-y-4">
                <div className="grid grid-cols-3 gap-4">
                  <div className="col-span-2"><label className="text-sm text-slate-400 mb-1.5 block">Nome Completo</label>
                    <input value={formAluno.nome} onChange={e=>setFormAluno(f=>({...f,nome:e.target.value}))} placeholder="Ex: João Silva"/>
                  </div>
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Gênero</label>
                    <select value={formAluno.genero} onChange={e=>setFormAluno(f=>({...f,genero:e.target.value}))}>
                      {generos.map(g=><option key={g} value={g}>{g.charAt(0).toUpperCase()+g.slice(1)}</option>)}
                    </select>
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-4">
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Idade</label>
                    <input type="number" value={formAluno.idade} onChange={e=>setFormAluno(f=>({...f,idade:e.target.value}))} placeholder="Ex: 28"/>
                  </div>
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Peso (kg)</label>
                    <input type="number" value={formAluno.peso} onChange={e=>setFormAluno(f=>({...f,peso:e.target.value}))} placeholder="Ex: 75"/>
                  </div>
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Altura (cm)</label>
                    <input type="number" value={formAluno.altura} onChange={e=>setFormAluno(f=>({...f,altura:e.target.value}))} placeholder="Ex: 175"/>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-sm text-slate-400 mb-1.5 block">E-mail</label>
                    <input type="email" value={formAluno.email} onChange={e=>setFormAluno(f=>({...f,email:e.target.value}))} placeholder="aluno@email.com"/>
                  </div>
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Telefone</label>
                    <input value={formAluno.telefone} onChange={e=>setFormAluno(f=>({...f,telefone:e.target.value}))} placeholder="(11) 99999-9999"/>
                  </div>
                </div>
                <div><label className="text-sm text-slate-400 mb-1.5 block">Turma</label>
                  <select value={formAluno.turma_id} onChange={e=>setFormAluno(f=>({...f,turma_id:e.target.value}))}>
                    <option value="">Sem turma definida</option>
                    {turmas.map(t=><option key={t.id} value={t.id}>{t.nome} [{metLabels[t.modalidade]||''}]</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Nível</label>
                    <select value={formAluno.nivel} onChange={e=>setFormAluno(f=>({...f,nivel:e.target.value}))}>
                      {niveis.map(n=><option key={n} value={n}>{n.charAt(0).toUpperCase()+n.slice(1)}</option>)}
                    </select>
                  </div>
                  <div><label className="text-sm text-slate-400 mb-1.5 block">Objetivo</label>
                    <select value={formAluno.objetivo} onChange={e=>setFormAluno(f=>({...f,objetivo:e.target.value}))}>
                      {objetivos.map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
                <div><label className="text-sm text-slate-400 mb-1.5 block">Restrições / Observações Médicas</label>
                  <textarea value={formAluno.restricoes} onChange={e=>setFormAluno(f=>({...f,restricoes:e.target.value}))} placeholder="Ex: Lesão no ombro direito, gestante 4 meses, dor lombar crônica..." rows={2} style={{resize:'none'}}/>
                </div>
                <div className="flex gap-3 mt-2">
                  <button onClick={()=>setShowModal(false)} className="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 hover:text-white transition-colors">Cancelar</button>
                  <button onClick={salvarAluno} className="flex-1 btn-primary py-2.5 rounded-xl">{editItem?'Salvar Alterações':'Cadastrar Aluno'}</button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    };

    // ─── Coaches ───────────────────────────────────────────────────────────────
    const Coaches = () => {
      const [usuarios, setUsuarios] = useState([]);
      useEffect(() => {
        sb.from('usuarios').select('*').eq('academia_id', ACADEMIA_ID)
          .then(({data}) => setUsuarios(data||[]));
      }, []);
      return (
        <div className="p-8 space-y-6 fade-in">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {usuarios.map(u => (
              <div key={u.id} className="card p-6">
                <div className="flex items-center gap-4 mb-5">
                  <div className="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
                    <Icon name="person" className="text-primary" size={22}/>
                  </div>
                  <div>
                    <h4 className="font-display font-bold text-lg">{u.nome}</h4>
                    <p className="text-sm text-slate-400">{u.email}</p>
                  </div>
                  <span className={`tag ml-auto ${u.perfil==='head_coach'?'tag-green':'tag-blue'}`}>
                    {u.perfil==='head_coach'?'Head Coach':'Proprietário'}
                  </span>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {[{l:'Treinos',v:'24'},{l:'Sugestões Aceitas',v:'78%'},{l:'Nota IA',v:'8.7'}].map(({l,v}) => (
                    <div key={l} className="text-center p-3 rounded-lg bg-bg-dark">
                      <p className="font-display font-bold text-lg text-primary">{v}</p>
                      <p className="text-xs text-slate-400 mt-0.5">{l}</p>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── Configurações ─────────────────────────────────────────────────────────
    const Configuracoes = ({ toast }) => {
      const [academia, setAcademia] = useState(null);
      const [equipamentos, setEquipamentos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        Promise.all([
          sb.from('academias').select('*').eq('id', ACADEMIA_ID).single(),
          sb.from('equipamentos').select('*').eq('academia_id', ACADEMIA_ID),
        ]).then(([{data:a},{data:e}]) => { setAcademia(a); setEquipamentos(e||[]); setLoading(false); });
      }, []);

      const salvar = async () => {
        setSaving(true);
        await sb.from('academias').update({ nome: academia.nome, max_alunos_por_aula: academia.max_alunos_por_aula, dias_treino_semana: academia.dias_treino_semana }).eq('id', ACADEMIA_ID);
        setSaving(false);
        toast('Configurações salvas!','success');
      };

      if (loading) return <Loading/>;
      return (
        <div className="p-8 space-y-6 fade-in max-w-2xl">
          <div className="card p-6 space-y-4">
            <h3 className="font-display font-bold text-lg">Perfil da Academia</h3>
            <div><label className="text-sm text-slate-400 mb-1.5 block">Nome</label>
              <input value={academia?.nome||''} onChange={e=>setAcademia(a=>({...a,nome:e.target.value}))}/></div>
            <div className="grid grid-cols-2 gap-4">
              <div><label className="text-sm text-slate-400 mb-1.5 block">Máx. Alunos/Aula</label>
                <input type="number" value={academia?.max_alunos_por_aula||''} onChange={e=>setAcademia(a=>({...a,max_alunos_por_aula:parseInt(e.target.value)}))}/></div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Dias/Semana</label>
                <input type="number" value={academia?.dias_treino_semana||''} onChange={e=>setAcademia(a=>({...a,dias_treino_semana:parseInt(e.target.value)}))}/></div>
            </div>
            <button onClick={salvar} disabled={saving} className="btn-primary px-6 py-2.5 rounded-xl flex items-center gap-2 text-sm">
              {saving?<><div className="loading-spinner" style={{width:16,height:16,borderWidth:2}}/>Salvando...</>:<><Icon name="save" size={16}/>Salvar Alterações</>}
            </button>
          </div>

          <div className="card p-6">
            <h3 className="font-display font-bold text-lg mb-4">Equipamentos</h3>
            <div className="space-y-2">
              {equipamentos.map(eq => (
                <div key={eq.id} className="flex items-center justify-between p-3 rounded-lg bg-bg-dark">
                  <span className="text-sm font-medium">{eq.nome}</span>
                  <span className="tag tag-green">{eq.quantidade} unid.</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ─── AcademiaContext: centraliza dados vindos do Supabase ─────────────────
    const AcademiaContext = createContext(null);
    const useAcademia = () => useContext(AcademiaContext);

    const AcademiaProvider = ({ children }) => {
      const [turmas, setTurmas] = useState([]);
      const [alunos, setAlunos] = useState([]);
      const [focos, setFocos] = useState([]);
      const [estoque, setEstoque] = useState({});
      const [loaded, setLoaded] = useState(false);

      // Sincroniza globals legados para compatibilidade
      useEffect(() => { TURMAS = turmas; }, [turmas]);
      useEffect(() => { ALUNOS = alunos; }, [alunos]);
      useEffect(() => { FOCOS_SESSAO = focos; }, [focos]);
      useEffect(() => { ESTOQUE_EQUIPAMENTOS = estoque; }, [estoque]);

      // Carregar tudo na inicialização
      const reload = async () => {
        const [rTurmas, rAlunos, rFocos, rEstoque] = await Promise.all([
          sb.from('turmas').select('*').eq('academia_id', ACADEMIA_ID).order('horario'),
          sb.from('alunos').select('*').eq('academia_id', ACADEMIA_ID).order('nome'),
          sb.from('focos_sessao').select('*').eq('academia_id', ACADEMIA_ID),
          sb.from('equipamentos_estoque').select('*').eq('academia_id', ACADEMIA_ID),
        ]);
        setTurmas(rTurmas.data || []);
        setAlunos(rAlunos.data || []);
        setFocos((rFocos.data && rFocos.data.length) ? rFocos.data : []);
        const estMap = {};
        (rEstoque.data || []).forEach(e => { estMap[e.equip_id] = e.quantidade; });
        setEstoque(estMap);
        setLoaded(true);
      };

      useEffect(() => { reload(); }, []);

      // CRUD Turmas
      const addTurma = async (turma) => {
        const payload = { ...turma, academia_id: ACADEMIA_ID };
        delete payload.id;
        const { data, error } = await sb.from('turmas').insert([payload]).select().single();
        if (error) return { error };
        setTurmas(prev => [...prev, data]);
        return { data };
      };
      const updateTurma = async (id, changes) => {
        const { data, error } = await sb.from('turmas').update(changes).eq('id', id).select().single();
        if (error) return { error };
        setTurmas(prev => prev.map(t => t.id === id ? data : t));
        return { data };
      };
      const removeTurma = async (id) => {
        const { error } = await sb.from('turmas').delete().eq('id', id);
        if (error) return { error };
        setTurmas(prev => prev.filter(t => t.id !== id));
        setAlunos(prev => prev.map(a => a.turma_id === id ? {...a, turma_id: null} : a));
        return { data: true };
      };

      // CRUD Alunos
      const addAluno = async (aluno) => {
        const payload = { ...aluno, academia_id: ACADEMIA_ID };
        delete payload.id;
        if (!payload.turma_id) payload.turma_id = null;
        const { data, error } = await sb.from('alunos').insert([payload]).select().single();
        if (error) return { error };
        setAlunos(prev => [...prev, data]);
        return { data };
      };
      const updateAluno = async (id, changes) => {
        if ('turma_id' in changes && !changes.turma_id) changes.turma_id = null;
        const { data, error } = await sb.from('alunos').update(changes).eq('id', id).select().single();
        if (error) return { error };
        setAlunos(prev => prev.map(a => a.id === id ? data : a));
        return { data };
      };
      const removeAluno = async (id) => {
        const { error } = await sb.from('alunos').delete().eq('id', id);
        if (error) return { error };
        setAlunos(prev => prev.filter(a => a.id !== id));
        return { data: true };
      };

      // CRUD Focos
      const addFoco = async (foco) => {
        const payload = { ...foco, academia_id: ACADEMIA_ID };
        delete payload.id;
        const { data, error } = await sb.from('focos_sessao').insert([payload]).select().single();
        if (error) return { error };
        setFocos(prev => [...prev, data]);
        return { data };
      };
      const updateFoco = async (id, changes) => {
        const { data, error } = await sb.from('focos_sessao').update(changes).eq('id', id).select().single();
        if (error) return { error };
        setFocos(prev => prev.map(f => f.id === id ? data : f));
        return { data };
      };
      const removeFoco = async (id) => {
        const { error } = await sb.from('focos_sessao').delete().eq('id', id);
        if (error) return { error };
        setFocos(prev => prev.filter(f => f.id !== id));
        return { data: true };
      };

      // Estoque de Equipamentos (upsert em lote)
      const saveEstoque = async (novoEstoque) => {
        // Remove zeros/vazios
        const entries = Object.entries(novoEstoque).filter(([, q]) => q && q > 0);
        // Deletar tudo e reinserir (mais simples que diff)
        await sb.from('equipamentos_estoque').delete().eq('academia_id', ACADEMIA_ID);
        if (entries.length > 0) {
          const rows = entries.map(([equip_id, quantidade]) => {
            const cat = CATALOGO_EQUIPAMENTOS.find(c => c.id === equip_id);
            return { academia_id: ACADEMIA_ID, equip_id, nome: cat?.nome || equip_id, quantidade };
          });
          await sb.from('equipamentos_estoque').insert(rows);
        }
        setEstoque(novoEstoque);
        return { data: true };
      };

      const value = {
        turmas, alunos, focos, estoque, loaded, reload,
        addTurma, updateTurma, removeTurma,
        addAluno, updateAluno, removeAluno,
        addFoco, updateFoco, removeFoco,
        saveEstoque,
      };

      if (!loaded) return (
        <div className="min-h-screen flex items-center justify-center" style={{background:'var(--bg)'}}>
          <div className="loading-spinner"/>
        </div>
      );

      return <AcademiaContext.Provider value={value}>{children}</AcademiaContext.Provider>;
    };

    // ─── App Root ──────────────────────────────────────────────────────────────
    const AppInner = ({ user, setUser }) => {
      const [page, setPage] = useState('dashboard');
      const [academia, setAcademia] = useState(null);
      const [toastState, setToastState] = useState(null);
      const [alertCount, setAlertCount] = useState(0);
      const [theme, setTheme] = useState('dark');
      const [filtro, setFiltro] = useState({tipo:'todos', id:null});

      const toggleTheme = () => {
        const next = theme === 'dark' ? 'light' : 'dark';
        setTheme(next);
        document.documentElement.setAttribute('data-theme', next);
      };

      const toast = (msg, type='success') => setToastState({msg, type, key: Date.now()});

      useEffect(() => {
        if (!user) return;
        sb.from('academias').select('*').eq('id', ACADEMIA_ID).single().then(({data}) => setAcademia(data));
        sb.from('alertas_seguranca').select('*',{count:'exact'}).eq('academia_id', ACADEMIA_ID).eq('resolvido',false)
          .then(({count}) => setAlertCount(count||0));
      }, [user]);

      useEffect(() => { setPage('dashboard'); }, [user]);

      const logout = () => { setUser(null); setPage('dashboard'); };

      const isCoach = user.perfil === 'head_coach';
      // Info do filtro ativo para exibir no subtitle
      const filtroLabel = filtro.tipo === 'turma' ? TURMAS.find(t=>t.id===filtro.id)?.nome : filtro.tipo === 'aluno' ? ALUNOS.find(a=>a.id===filtro.id)?.nome : null;

      const pageMap = {
        dashboard: isCoach ? <DashboardCoach setPage={setPage} toast={toast} filtro={filtro}/> : <DashboardDono setPage={setPage}/>,
        gerar: <GerarTreino toast={toast} filtro={filtro}/>,
        analise: <Analise toast={toast} filtro={filtro}/>,
        periodizacao: <Periodizacao toast={toast} filtro={filtro} setPage={setPage}/>,
        seguranca: <Seguranca toast={toast} filtro={filtro}/>,
        cadastro: <CadastroTurmasAlunos toast={toast}/>,
        focos: <CadastroFocos toast={toast}/>,
        equipamentos: <CadastroEquipamentos toast={toast}/>,
        admin: <Admin toast={toast}/>,
        estrategico: <Estrategico/>,
        coaches: <Coaches/>,
        configuracoes: <Configuracoes toast={toast}/>,
      };

      const titleMap = {
        dashboard: ['Painel', isCoach ? 'Visão geral do dia e desempenho' : 'Métricas e gestão da academia'],
        gerar: ['Gerar Treino', 'Inteligência artificial para criar sessões otimizadas'],
        analise: ['Análise de Programação', 'Estatísticas detalhadas da programação'],
        periodizacao: ['Periodização', 'Planejamento estratégico de macrociclos'],
        seguranca: ['Verificação de Segurança', 'Auditoria de segurança e riscos da semana'],
        cadastro: ['Turmas e Alunos', 'Cadastro e gestão de turmas e alunos da academia'],
        focos: ['Focos de Sessão', 'Gerenciar tipos de foco disponíveis na geração de treinos'],
        equipamentos: ['Equipamentos', 'Cadastro de equipamentos disponíveis na academia para geração inteligente de treinos'],
        admin: ['Admin', 'Reset do sistema, backups e recuperação'],
        estrategico: ['Visão Estratégica', 'Recomendações de IA para gestão do negócio'],
        coaches: ['Gestão de Professores', 'Desempenho e métricas dos coaches'],
        configuracoes: ['Configurações', 'Perfil e dados da academia'],
      };

      const [title, subtitle] = titleMap[page] || ['iA Coach',''];

      return (
        <div className="flex h-screen overflow-hidden">
          <Sidebar user={user} page={page} setPage={setPage} onLogout={logout} academia={academia}/>
          <div className="flex-1 flex flex-col overflow-hidden">
            <Topbar title={title} subtitle={filtroLabel ? `${subtitle} — ${filtroLabel}` : subtitle} alertCount={isCoach ? alertCount : 0} theme={theme} toggleTheme={toggleTheme} filtro={filtro} setFiltro={setFiltro}/>
            <div className="flex-1 overflow-y-auto">
              {pageMap[page] || pageMap.dashboard}
            </div>
          </div>
          {toastState && <Toast key={toastState.key} msg={toastState.msg} type={toastState.type} onClose={() => setToastState(null)}/>}
          {isCoach && (
            <button onClick={() => setPage('gerar')} title="Gerar Novo Treino"
              className="fixed bottom-7 right-7 w-14 h-14 bg-primary text-bg-dark rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50"
              style={{boxShadow:'0 0 30px rgba(67,243,32,0.4)'}}>
              <Icon name="auto_awesome" size={24}/>
            </button>
          )}
        </div>
      );
    };

    // App wrapper — se usuário logado, envolve com AcademiaProvider
    const App = () => {
      const [user, setUser] = useState(null);
      if (!user) return <LoginPage onLogin={setUser}/>;
      return <AcademiaProvider><AppInner user={user} setUser={setUser}/></AcademiaProvider>;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
