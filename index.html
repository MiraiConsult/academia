            <p className="text-xs text-slate-500 mt-3">Analisando treinos de <span className="font-bold text-primary">{new Date(periodo.inicio).toLocaleDateString('pt-BR')}</span> até <span className="font-bold text-primary">{new Date(periodo.fim).toLocaleDateString('pt-BR')}</span> · {treinos.length} treino{treinos.length!==1?'s':''} encontrado{treinos.length!==1?'s':''}</p>
          </div>

          {/* Empty state quando não há treinos */}
          {treinos.length === 0 && (
            <div className="card p-12 text-center">
              <Icon name="monitoring" className="text-primary/20" size={56}/>
              <h3 className="font-display font-bold text-xl mt-4 mb-2">Nenhum treino para analisar</h3>
              <p className="text-slate-400 text-sm mb-5 max-w-md mx-auto">Gere e salve treinos para que a IA analise sua programação, identifique padrões e sugira melhorias.</p>
              <button onClick={()=>toast('Navegue para "Gerar Treino" no menu lateral.')} className="btn-primary px-6 py-3 rounded-xl inline-flex items-center gap-2">
                <Icon name="auto_awesome" size={18}/>Ir para Gerar Treino
              </button>
            </div>
          )}

          {/* KPIs */}
          {treinos.length > 0 && <>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              {l:'Treinos Analisados', v: s.totalTreinos, i:'fitness_center', c:'text-primary'},
              {l:'Movimentos Únicos', v: s.movFreq.length, i:'category', c:'text-blue-400'},
              {l:'Ginástica', v: s.modalDist.ginastica+'%', i:'sports_gymnastics', c:'text-purple-400'},
              {l:'Levantamento', v: s.modalDist.levantamento+'%', i:'fitness_center', c:'text-red-400'},
            ].map(({l,v,i,c}) => (
              <div key={l} className="card p-4 flex items-center gap-3">
                <Icon name={i} className={c} size={24}/>
                <div>
                  <p className="font-display font-bold text-xl">{v}</p>
                  <p className="text-xs text-slate-400">{l}</p>

              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {/* Freq movimentos */}
            <div className="card p-6">
              <h3 className="font-display font-bold text-lg mb-2">Frequência de Movimentos</h3>
              <p className="text-xs text-slate-400 mb-5">Quantas vezes cada movimento aparece nos treinos</p>
              {s.movFreq.length > 0 ? (
                <div className="space-y-3">
                  {s.movFreq.map(({nome,count,repsTotal:rt}) => (
                    <div key={nome} className="flex items-center gap-3">
                      <span className="text-sm font-medium w-36 text-slate-300 truncate" title={nome}>{nome}</span>
                      <div className="flex-1 bg-primary/5 rounded-full h-6 overflow-hidden">
                        <div className="h-full bg-primary/30 border-r-2 border-primary flex items-center justify-end pr-2 rounded-full transition-all"

                  ))}
                </div>
              ) : <p className="text-slate-500 text-sm text-center py-8">Nenhum treino salvo ainda</p>}

            {/* Grupos Musculares */}
            <div className="card p-6">
              <h3 className="font-display font-bold text-lg mb-2">Distribuição por Grupo Muscular</h3>
              <p className="text-xs text-slate-400 mb-5">% de volume por categoria de movimento</p>
              {s.grupoDist.length > 0 ? (
                <div className="space-y-3">
                  {s.grupoDist.map(({l,v}) => (
                    <div key={l} className="flex items-center gap-3">
                      <span className="text-sm font-medium w-20 text-slate-300">{l}</span>
                      <div className="flex-1 bg-primary/5 rounded-full h-6 overflow-hidden">
                        <div className={`h-full flex items-center justify-end pr-2 rounded-full transition-all ${v>45?'bg-red-500/20 border-r-2 border-red-500':'bg-primary/25 border-r-2 border-primary'}`}
                          style={{width:`${(v/maxG)*100}%`, minWidth:'30px'}}>
                          <span className={`text-xs font-bold ${v>45?'text-red-400':'text-primary'}`}>{v}%</span>
                        </div>
                      </div>
                      {v>45 && <Icon name="warning" className="text-red-400" size={14}/>}
                    </div>
                  ))}
                </div>
              ) : <p className="text-slate-500 text-sm text-center py-8">Nenhum dado disponível</p>}
              {s.grupoDist.some(g=>g.v>45) && <p className="text-xs text-red-400 mt-3 flex items-center gap-1"><Icon name="info" size={12}/>Vermelho indica concentração excessiva (&gt;45%)</p>}
            </div>

            {/* Modalidades */}
            <div className="card p-6">
              <h3 className="font-display font-bold text-lg mb-2">Distribuição por Modalidade</h3>
              <p className="text-xs text-slate-400 mb-5">CrossFit: Ginástica (G) · Levantamento (W) · Monoestrutural (M)</p>
              <div className="flex items-center gap-6">
                <div className="relative w-32 h-32 shrink-0">
                  <svg viewBox="0 0 36 36" className="w-32 h-32 -rotate-90">
                    <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(67,243,32,0.1)" strokeWidth="3"/>
                    <circle cx="18" cy="18" r="15.9" fill="none" stroke="#43f320" strokeWidth="3" strokeDasharray={`${s.modalDist.ginastica} 100`} strokeLinecap="round"/>
                    <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(67,243,32,0.45)" strokeWidth="3" strokeDasharray={`${s.modalDist.levantamento} 100`} strokeDashoffset={`-${s.modalDist.ginastica}`} strokeLinecap="round"/>
                    <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(67,243,32,0.65)" strokeWidth="3" strokeDasharray={`${s.modalDist.monoestrutural} 100`} strokeDashoffset={`-${s.modalDist.ginastica+s.modalDist.levantamento}`} strokeLinecap="round"/>
                  </svg>

                    <span className="text-xs font-bold text-slate-400">{s.totalTreinos} WODs</span>

                </div>
                <div className="space-y-3">
                  {[
                    {l:'Ginástica (G)',v:s.modalDist.ginastica,c:'bg-primary',desc:'Pull-ups, HSPU, Box Jumps...'},
                    {l:'Levantamento (W)',v:s.modalDist.levantamento,c:'bg-primary/60',desc:'Clean, Snatch, Deadlift...'},
                    {l:'Monoestrutural (M)',v:s.modalDist.monoestrutural,c:'bg-primary/35',desc:'Run, Row, Bike...'}

                        <span className="font-bold text-primary ml-auto">{v}%</span>

                      <p className="text-xs text-slate-500 ml-6">{desc}</p>

              </div>

            {/* Volume por dia da semana */}
            <div className="card p-6">
              <h3 className="font-display font-bold text-lg mb-2">Volume por Dia da Semana</h3>
              <p className="text-xs text-slate-400 mb-5">Quantidade de treinos registrados por dia</p>
              <div className="flex items-end gap-2 h-32">
                {s.volumeSemanal.map((v,i) => (
                  <div key={i} className="flex-1 flex flex-col items-center gap-1">
                    <span className="text-xs font-bold text-primary">{v||''}</span>
                    <div className={`w-full rounded-sm transition-all hover:bg-primary/25 ${v>0?'bg-primary/15 border-t-2 border-primary':'bg-white/5'}`}
                      style={{height:`${v>0?(v/maxVol)*100:5}%`, minHeight: v>0?'8px':'4px'}}/>
                    <span className="text-xs text-slate-500">{diasSemana[i]}</span>
                  </div>
                ))}

          {/* Avaliação Crítica IA */}
          <div className="card-ai p-6 relative overflow-hidden">
            <div className="absolute -right-10 -top-10 w-48 h-48 bg-primary/5 rounded-full blur-2xl"/>
            <div className="flex items-center gap-4 mb-6 relative">
              <div className="w-12 h-12 bg-primary rounded-xl flex items-center justify-center">
                <Icon name="psychology" className="text-bg-dark" size={24}/>
              </div>
              <div>
                <h3 className="font-display font-bold text-xl">Avaliação Crítica da IA</h3>
                <p className="text-primary text-xs font-bold uppercase tracking-widest">Análise baseada em {s.totalTreinos} treino{s.totalTreinos!==1?'s':''}</p>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 relative">
              <div>
                <h4 className="font-bold flex items-center gap-2 mb-4"><Icon name="warning" className="text-red-400" size={18}/>Fraquezas Identificadas</h4>
                <ul className="space-y-3">
                  {(s.fraquezas.length > 0 ? s.fraquezas : ['Nenhuma fraqueza crítica detectada com os dados atuais.']).map((t,i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-slate-300">
                      <Icon name="circle" className="text-primary mt-0.5 shrink-0" size={10}/>
                      {t}
                    </li>
                  ))}
                </ul>
              </div>
              <div className="border-l border-primary/15 pl-8">
                <h4 className="font-bold flex items-center gap-2 mb-4"><Icon name="lightbulb" className="text-primary" size={18}/>Sugestões de Ajuste</h4>
                <ul className="space-y-3">
                  {(s.sugestoes.length > 0 ? s.sugestoes : ['Continue gerando e salvando treinos para receber sugestões personalizadas.']).map((t,i) => (
                    <li key={i} className="flex items-start gap-2 text-sm text-slate-300">
                      <Icon name="check_circle" className="text-primary mt-0.5 shrink-0" size={14}/>
                      {t}
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>
          </>}
        </div>
      );
    };

    // ─── Periodização ──────────────────────────────────────────────────────────
    const Periodizacao = ({ toast, filtro, setPage }) => {
      const [periodo, setPeriodo] = useState(null);
      const [loading, setLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [showImport, setShowImport] = useState(false);
      const [importForm, setImportForm] = useState({ nome: '', texto: '', data_inicio: hoje() });
      const [form, setForm] = useState({ nome: '', objetivo: 'Construção de base', data_inicio: hoje(), data_fim: '', modalidade: 'crossfit' });
      const [editSemana, setEditSemana] = useState(null);
      const [semanaExpandida, setSemanaExpandida] = useState(null);
      const [treinosDoPeriodo, setTreinosDoPeriodo] = useState([]);

      // Parser de periodização em texto livre
      const parseImportacao = (texto) => {
        const linhas = texto.split('\n').map(l => l.trim()).filter(Boolean);
        const semanas = [];
        let semanaAtual = null;

        linhas.forEach(linha => {
          // Detecta "Semana X" ou "Sem X" ou "Week X" ou "S1"
          const matchSem = linha.match(/^(?:semana|sem|week|s)\s*(\d+)[:.\s-]*(.*)$/i);
          if (matchSem) {
            if (semanaAtual) semanas.push(semanaAtual);
            const num = parseInt(matchSem[1]);
            semanaAtual = {
              semana: num,
              fase: matchSem[2] || `Semana ${num}`,
              volume: 70 + Math.floor(Math.random()*20),
              intensidade: 65 + Math.floor(Math.random()*25),
              deload: /deload|descanso|recupera/i.test(matchSem[2]),
              foco_semana: matchSem[2] || '',
              detalhes: [],
            };
            return;
          }
          // Linha com fase/descrição
          if (semanaAtual) {
            // Tenta extrair volume/intensidade
            const volMatch = linha.match(/volume[:\s]*(\d+)/i);
            const intMatch = linha.match(/intensidade[:\s]*(\d+)/i);
            if (volMatch) semanaAtual.volume = parseInt(volMatch[1]);
            if (intMatch) semanaAtual.intensidade = parseInt(intMatch[1]);
            if (/deload|descanso|recupera/i.test(linha)) semanaAtual.deload = true;
            semanaAtual.detalhes.push(linha);
            if (!semanaAtual.foco_semana) semanaAtual.foco_semana = linha;
          }
        });
        if (semanaAtual) semanas.push(semanaAtual);
        return semanas;
      };

      const importarPeriodizacao = async () => {
        if (!importForm.nome.trim() || !importForm.texto.trim()) {
          toast('Preencha nome e cole o texto da periodização', 'error');
          return;
        }
        const semanas = parseImportacao(importForm.texto);
        if (semanas.length === 0) {
          toast('Não foi possível identificar semanas. Use "Semana 1: ..." por linha.', 'error');
          return;
        }
        const dataInicio = new Date(importForm.data_inicio);
        const dataFim = new Date(dataInicio); dataFim.setDate(dataFim.getDate() + (semanas.length * 7));
        await sb.from('periodizacoes').update({status: 'arquivado'}).eq('academia_id', ACADEMIA_ID).eq('status','ativo');
        const payload = {
          academia_id: ACADEMIA_ID, criado_por: COACH_ID,
          nome: importForm.nome,
          objetivo: 'Importada (usuário)',
          modalidade: 'crossfit',
          data_inicio: importForm.data_inicio,
          data_fim: dataFim.toISOString().split('T')[0],
          semanas,
          status: 'ativo',
          importada: true,
          texto_original: importForm.texto,
        };
        const { data, error } = await sb.from('periodizacoes').insert([payload]).select().single();
        if (error) { toast('Erro: ' + error.message, 'error'); return; }
        setPeriodo(data);
        setShowImport(false);
        setImportForm({ nome: '', texto: '', data_inicio: hoje() });
        toast(`Periodização importada com ${semanas.length} semanas!`, 'success');
      };

      // Atualiza uma semana específica da periodização (persiste no banco)
      const atualizarSemana = async (idx, changes) => {
        if (!periodo) return;
        const novasSemanas = [...(periodo.semanas || [])];
        novasSemanas[idx] = {...novasSemanas[idx], ...changes};
        const { data, error } = await sb.from('periodizacoes').update({semanas: novasSemanas}).eq('id', periodo.id).select().single();
        if (error) { toast('Erro ao atualizar semana: ' + error.message, 'error'); return; }
        setPeriodo(data);
        toast('Semana atualizada!', 'success');
      };

      // Gerar sugestões de WODs para uma semana baseado no foco e intensidade
      const sugerirWodsSemana = (semana) => {
        const focoMap = {
          'base': 'Resistência',
          'força': 'Força Pura',
          'forca': 'Força Pura',
          'pico': 'LPO + Condicionamento',
          'hiper': 'Força Pura',
          'metcon': 'Resistência',
          'taper': 'Mobilidade + Técnica',
          'afinamento': 'Mobilidade + Técnica',
          'deload': 'Mobilidade + Técnica',
          'skill': 'Ginástica',
          'técnico': 'Ginástica',
          'open': 'LPO + Condicionamento',
          'adaptação': 'Mobilidade + Técnica',
          'acumulação': 'Resistência',
          'intensificação': 'Força Pura',
          'recuperação': 'Mobilidade + Técnica',
        };
        const focoDetectado = Object.entries(focoMap).find(([k]) => (semana.fase||'').toLowerCase().includes(k) || (semana.foco_semana||'').toLowerCase().includes(k))?.[1] || 'LPO + Condicionamento';
        const numAlunos = 15;
        const equipDisp = CATALOGO_EQUIPAMENTOS.filter(c => (ctx.estoque[c.id]||0) > 0).map(c => ({id:c.id, nome:c.nome, quantidade:ctx.estoque[c.id]}));
        const sugestoes = [];
        for (let i = 0; i < 3; i++) {
          const w = gerarWodInteligente(focoDetectado, numAlunos, equipDisp, '', false);
          sugestoes.push({...w, foco: focoDetectado});
        }
        return sugestoes;
      };

      // Cria um treino para um dia específico da periodização
      const criarTreinoDoDia = async (data_treino, semana) => {
        const focoMap = {
          'base': 'Resistência', 'força': 'Força Pura', 'pico': 'LPO + Condicionamento',
          'hiper': 'Força Pura', 'metcon': 'Resistência', 'taper': 'Mobilidade + Técnica',
          'deload': 'Mobilidade + Técnica', 'skill': 'Ginástica',
        };
        const foco = Object.entries(focoMap).find(([k]) => (semana.fase||'').toLowerCase().includes(k))?.[1] || 'LPO + Condicionamento';
        const numAlunos = 15;
        const equipDisp = CATALOGO_EQUIPAMENTOS.filter(c => (ctx.estoque[c.id]||0) > 0).map(c => ({id:c.id, nome:c.nome, quantidade:ctx.estoque[c.id]}));
        const wod = gerarWodInteligente(foco, numAlunos, equipDisp, '', false);
        const aquecOpts = (AQUECIMENTOS[periodo.modalidade || 'crossfit'] || AQUECIMENTOS['crossfit'])[foco] || Object.values(AQUECIMENTOS['crossfit'])[0];
        const skillOpts = SKILLS[foco] || SKILLS['Força Pura'];
        const skillBase = skillOpts[Math.floor(Math.random() * skillOpts.length)];
        const novo = {
          academia_id: ACADEMIA_ID, criado_por: COACH_ID,
          data_treino, metodologia: periodo.modalidade || 'crossfit',
          nome: wod.nome, num_alunos: numAlunos, foco, focos: [foco],
          aquecimento: { descricao: aquecOpts[0], duracao_min: 12 },
          skill: { ...skillBase, duracao_min: 14 },
          wod: { ...wod, tempo_wod_min: 20 },
          cooldown: { descricao: '5 min caminhada leve + mobilidade' },
          adaptacoes: { iniciante: 'Reduza cargas 30-40%.', avancado: 'RX + colete 9kg.' },
          tempo_previsto_min: 55, intensidade: 'media',
          status: 'rascunho',
        };
        const { data, error } = await sb.from('treinos').insert([novo]).select().single();
        if (error) { toast('Erro: ' + error.message, 'error'); return; }
        setTreinosDoPeriodo(prev => [...prev, data]);
        toast('Treino criado para ' + new Date(data_treino).toLocaleDateString('pt-BR'), 'success');
      };

      const carregarPeriodo = async () => {
        const { data } = await sb.from('periodizacoes').select('*').eq('academia_id', ACADEMIA_ID).eq('status','ativo').order('created_at',{ascending:false}).limit(1).maybeSingle();
        if (data) {
          setPeriodo(data);
          // Carregar treinos do período
          if (data.data_inicio && data.data_fim) {
            const { data: ts } = await sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID)
              .gte('data_treino', data.data_inicio).lte('data_treino', data.data_fim);
            setTreinosDoPeriodo(ts || []);
          }
        }
        setLoading(false);
      };

      useEffect(() => { carregarPeriodo(); }, []);

      const PERIODIZACAO_TEMPLATES = {
        'Preparação para competição': {
          fases: ['Base Geral','Força Específica','Pico','Afinamento'],
          semanas: 12,
          gerarSemanas: () => Array.from({length:12},(_,i) => ({
            semana: i+1,
            fase: i<3?'Base Geral':i<6?'Força Específica':i<10?'Pico':'Afinamento',
            volume: [75,80,85,50,80,85,50,85,90,95,40,30][i],
            intensidade: [60,65,70,50,75,80,50,85,88,92,60,40][i],
            deload: i===3||i===6||i===10||i===11,
            foco_semana: i<3?'Construção aeróbia + técnica de LPO':i<6?'Força máxima + condicionamento médio':i<10?'Intensidade alta + simulação de competição':'Recuperação ativa, baixo volume',
          })),
        },
        'Construção de base': {
          fases: ['Adaptação','Resistência Muscular','Força Base','Recuperação'],
          semanas: 12,
          gerarSemanas: () => Array.from({length:12},(_,i) => ({
            semana: i+1,
            fase: i<3?'Adaptação':i<7?'Resistência Muscular':i<11?'Força Base':'Recuperação',
            volume: [60,65,70,75,78,80,50,75,80,82,85,40][i],
            intensidade: [50,55,58,60,62,65,45,65,68,70,72,40][i],
            deload: i===6||i===11,
            foco_semana: i<3?'Padrões motores + mobilidade + cardio base':i<7?'Aumento progressivo de volume e complexidade':i<11?'Construção de força com cargas moderadas-altas':'Deload completo',
          })),
        },
        'Hipertrofia': {
          fases: ['Acumulação','Intensificação','Pico de Volume','Deload'],
          semanas: 8,
          gerarSemanas: () => Array.from({length:8},(_,i) => ({
            semana: i+1,
            fase: i<3?'Acumulação':i<6?'Intensificação':i<7?'Pico de Volume':'Deload',
            volume: [75,80,85,50,85,90,95,45][i],
            intensidade: [60,63,65,50,70,73,75,45][i],
            deload: i===3||i===7,
            foco_semana: i<3?'Alto volume, baixa carga (3-4 séries x 10-15 reps)':i<6?'Volume moderado, carga crescente (4-5 séries x 6-10 reps)':i<7?'Volume máximo, carga moderada':'Recuperação ativa',
          })),
        },
        'Deload/Recuperação': {
          fases: ['Deload Ativo','Retorno Gradual'],
          semanas: 4,
          gerarSemanas: () => Array.from({length:4},(_,i) => ({
            semana: i+1,
            fase: i<2?'Deload Ativo':'Retorno Gradual',
            volume: [40,45,55,65][i],
            intensidade: [40,45,55,60][i],
            deload: i<2,
            foco_semana: i<2?'Mobilidade, yoga, corrida leve, técnica com PVC':'Retorno progressivo à carga normal',
          })),
        },
        'Preparação para Open': {
          fases: ['Base Metcon','Foco Técnico','Simulação Open','Afinamento'],
          semanas: 12,
          gerarSemanas: () => Array.from({length:12},(_,i) => ({
            semana: i+1,
            fase: i<3?'Base Metcon':i<7?'Foco Técnico':i<10?'Simulação Open':'Afinamento',
            volume: [70,75,80,50,75,80,85,50,88,92,45,35][i],
            intensidade: [65,68,72,50,72,75,78,50,85,90,55,40][i],
            deload: i===3||i===7||i===10||i===11,
            foco_semana: i<3?'Capacidade metabólica + construção de motor':i<7?'Movimentos técnicos (MU, HSPU, DU, Pistols)':i<10?'Simulação de WODs estilo Open, time caps reais':'Deload inteligente antes do Open',
          })),
        },
      };

      const criar = async () => {
        const objetivo = form.objetivo || 'Construção de base';
        const template = PERIODIZACAO_TEMPLATES[objetivo] || PERIODIZACAO_TEMPLATES['Construção de base'];
        const semanas = template.gerarSemanas();
        // Calcula data_fim baseado em data_inicio + numero de semanas
        const dataIni = new Date(form.data_inicio);
        const dataFim = form.data_fim ? form.data_fim : (() => {
          const d = new Date(dataIni); d.setDate(d.getDate() + semanas.length * 7 - 1);
          return d.toISOString().split('T')[0];
        })();
        // Arquivar periodizações anteriores
        await sb.from('periodizacoes').update({status: 'arquivado'}).eq('academia_id', ACADEMIA_ID).eq('status','ativo');
        const payload = {
          academia_id: ACADEMIA_ID, criado_por: COACH_ID,
          nome: form.nome || `Ciclo ${objetivo} — ${metLabels[form.modalidade]}`,
          objetivo,
          modalidade: form.modalidade || 'crossfit',
          data_inicio: form.data_inicio, data_fim: dataFim,
          semanas, status: 'ativo',
        };
        const { data, error } = await sb.from('periodizacoes').insert([payload]).select().single();
        if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
        setPeriodo(data);
        setShowModal(false);
        toast('Periodização criada com sucesso!','success');
      };

      const fasesFromPeriodo = periodo?.semanas ? [...new Set(periodo.semanas.map(s=>s.fase))] : [];
      const allFaseColors = ['bg-primary/30 border-primary/50','bg-blue-500/20 border-blue-500/30','bg-purple-500/20 border-purple-500/30','bg-orange-500/20 border-orange-500/30','bg-red-500/20 border-red-500/30'];
      const allFaseTextColors = ['text-primary','text-blue-400','text-purple-400','text-orange-400','text-red-400'];
      const fases = fasesFromPeriodo;
      const faseColors = fases.map((_,i)=>allFaseColors[i%allFaseColors.length]);
      const faseTextColors = fases.map((_,i)=>allFaseTextColors[i%allFaseTextColors.length]);

      if (loading) return <Loading/>;

      return (
        <div className="p-8 space-y-6 fade-in">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="font-display font-bold text-2xl">{periodo?.nome || 'Planejamento de Periodização'}</h2>
              <p className="text-slate-400 text-sm mt-0.5">{periodo ? `${fmtDate(periodo.data_inicio)} → ${fmtDate(periodo.data_fim)}` : 'Nenhum ciclo ativo'}</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setShowImport(true)} className="btn-ghost px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm">
                <Icon name="upload_file" size={18}/>Importar
              </button>
              <button onClick={() => setShowModal(true)} className="btn-primary px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm">
                <Icon name="add" size={18}/>Novo Ciclo
              </button>
            </div>
          </div>

          {periodo ? (
            <>
              {/* Gantt */}
              <div className="card overflow-x-auto">
                <div className="min-w-[900px]">
                  {(() => {
                    const sems = periodo.semanas || [];
                    const numSem = sems.length;
                    const gridCols = `repeat(${numSem}, minmax(0, 1fr))`;
                    return (<>
                  {/* Header semanas */}
                  <div className="flex border-b border-white/5">
                    <div className="w-40 shrink-0 p-3 text-xs font-bold text-slate-500 uppercase">Categoria</div>
                    <div className="flex-1 grid" style={{gridTemplateColumns:gridCols}}>
                      {sems.map((s,i) => (
                        <div key={i} className={`p-3 text-center text-xs font-bold border-l border-white/5 ${s.deload?'bg-blue-500/5 text-blue-400':'text-slate-400'}`}
                          title={s.foco_semana||''}>
                          {s.deload?'DL':'S'}{i+1}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Fases */}
                  <div className="flex border-b border-white/5">
                    <div className="w-40 shrink-0 p-3 flex items-center gap-2 text-sm font-bold">
                      <Icon name="settings_input_component" className="text-primary" size={16}/>Fases
                    </div>
                    <div className="flex-1 grid p-2 gap-1" style={{gridTemplateColumns:gridCols}}>
                      {sems.map((s,i) => {
                        const fi = fases.indexOf(s?.fase);
                        const isFirst = i===0 || sems[i-1]?.fase !== s?.fase;
                        return (
                          <div key={i} className={`gantt-bar border ${faseColors[fi>=0?fi:0]} ${faseTextColors[fi>=0?fi:0]} relative group cursor-pointer`} title={s?.fase + (s?.foco_semana ? ' — '+s.foco_semana : '') + ' — Clique para editar'}
                            onClick={()=>setEditSemana({idx:i, ...s})}>
                            {isFirst && <span className="truncate text-xs">{s?.fase?.split(' ')[0]}</span>}
                            <Icon name="edit" size={10} className="absolute top-0.5 right-0.5 opacity-0 group-hover:opacity-60"/>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Volume */}
                  <div className="flex border-b border-white/5">
                    <div className="w-40 shrink-0 p-3 flex items-center gap-2 text-sm font-bold">
                      <Icon name="fitness_center" className="text-primary" size={16}/>Volume %
                    </div>
                    <div className="flex-1 p-3 flex items-end gap-1 h-16">
                      {sems.map((s,i) => (
                        <div key={i} className="flex-1 rounded-sm bg-primary/15 border-t border-primary/30 relative group"
                          style={{height:`${s.volume}%`}} title={`S${i+1}: ${s.volume}%`}>
                          <div className="absolute -top-5 left-1/2 -translate-x-1/2 text-xs text-primary font-bold opacity-0 group-hover:opacity-100">{s.volume}%</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Intensidade */}
                  <div className="flex border-b border-white/5">
                    <div className="w-40 shrink-0 p-3 flex items-center gap-2 text-sm font-bold">
                      <Icon name="bolt" className="text-primary" size={16}/>Intensidade %
                    </div>
                    <div className="flex-1 p-3 flex items-end gap-1 h-16">
                      {sems.map((s,i) => (
                        <div key={i} className="flex-1 rounded-sm bg-orange-500/15 border-t border-orange-400/40"
                          style={{height:`${s.intensidade}%`}} title={`S${i+1}: ${s.intensidade}%`}/>
                      ))}
                    </div>
                  </div>

                  {/* Deload */}
                  <div className="flex">
                    <div className="w-40 shrink-0 p-3 flex items-center gap-2 text-sm font-bold">
                      <Icon name="rebase_edit" className="text-primary" size={16}/>Deload
                    </div>
                    <div className="flex-1 grid p-2 gap-1" style={{gridTemplateColumns:gridCols}}>
                      {sems.map((s,i) => (
                        <div key={i} className={`h-10 rounded-lg flex items-center justify-center ${s.deload?'bg-blue-500/20 border border-blue-500/30':'bg-transparent'}`}>
                          {s.deload && <Icon name="check_circle" className="text-blue-400" size={16}/>}
                        </div>
                      ))}
                    </div>
                  </div>
                  </>);
                  })()}
                </div>
              </div>

              {/* Insights dinâmicos */}
              {(() => {
                const sems = periodo.semanas || [];
                const deloadWeeks = sems.filter(s=>s.deload).map(s=>s.semana);
                const maxIntWeek = sems.reduce((best,s) => s.intensidade > (best?.intensidade||0) ? s : best, sems[0]);
                const fasesInfo = fases.map(f => ({ fase: f, semanas: sems.filter(s=>s.fase===f).length }));
                return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="psychology" className="text-primary" size={18}/><h4 className="font-bold text-sm uppercase tracking-wide">Estrutura do Ciclo</h4></div>
                    <p className="text-sm text-slate-400">{sems.length} semanas · {deloadWeeks.length} deload{deloadWeeks.length!==1?'s':''} (S{deloadWeeks.join(', S')}) · Objetivo: {periodo.objetivo}</p>
                    <div className="mt-3 space-y-1">{fasesInfo.map(f=><p key={f.fase} className="text-xs text-slate-500">• {f.fase}: {f.semanas} semana{f.semanas!==1?'s':''}</p>)}</div>
                  </div>
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="bolt" className="text-orange-400" size={18}/><h4 className="font-bold text-sm uppercase tracking-wide">Pico de Intensidade</h4></div>
                    <p className="text-sm text-slate-400">Semana {maxIntWeek?.semana}: {maxIntWeek?.intensidade}% intensidade · {maxIntWeek?.volume}% volume</p>
                    <p className="text-xs text-slate-500 mt-2">Fase: {maxIntWeek?.fase}</p>
                    {maxIntWeek?.foco_semana && <p className="text-xs text-primary mt-1">{maxIntWeek.foco_semana}</p>}
                  </div>
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="event_note" className="text-purple-400" size={18}/><h4 className="font-bold text-sm uppercase tracking-wide">Recomendação IA</h4></div>
                    <p className="text-sm text-slate-400">{
                      deloadWeeks.length < Math.floor(sems.length/4)
                        ? `Considere adicionar mais deloads. Recomendado: 1 a cada 3-4 semanas de carga.`
                        : `Distribuição de deloads adequada. Mantenha a progressão conforme planejado e ajuste se sentir fadiga acumulada.`
                    }</p>
                  </div>
                </div>
                );
              })()}
            </>
          ) : (
            <div className="card p-12 flex flex-col items-center text-center">
              <Icon name="calendar_month" className="text-primary/20" size={64}/>
              <h3 className="font-display font-bold text-xl mt-4 mb-2">Nenhum ciclo ativo</h3>
              <p className="text-slate-400 text-sm mb-5">Crie seu primeiro ciclo de periodização com IA</p>
              <button onClick={() => setShowModal(true)} className="btn-primary px-6 py-3 rounded-xl">Criar Periodização</button>
            </div>
          )}

          <Modal open={showModal} onClose={() => setShowModal(false)} title="Novo Ciclo de Periodização">
            <div className="space-y-4">
              <div><label className="text-sm text-slate-400 mb-1.5 block">Nome do ciclo</label><input value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Macrociclo Open 2025"/></div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Modalidade</label>
                <div className="grid grid-cols-3 gap-2">
                  {[{v:'crossfit',l:'CrossFit',i:'fitness_center'},{v:'hyrox',l:'Hyrox',i:'timer'},{v:'bootcamp',l:'Bootcamp',i:'groups'}].map(({v,l,i})=>(
                    <button key={v} type="button" onClick={()=>setForm(f=>({...f,modalidade:v}))}
                      className={`flex items-center justify-center gap-1.5 py-2.5 rounded-lg border text-sm font-bold transition-all ${form.modalidade===v?'border-primary bg-primary/10 text-primary':'border-white/10 text-slate-400 hover:border-primary/30'}`}>
                      <Icon name={i} size={16}/>{l}
                    </button>
                  ))}
                </div>
              </div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Objetivo</label>
                <select value={form.objetivo} onChange={e=>setForm(f=>({...f,objetivo:e.target.value}))}>
                  {['Preparação para competição','Construção de base','Hipertrofia','Deload/Recuperação','Preparação para Open'].map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="text-sm text-slate-400 mb-1.5 block">Data Início</label><input type="date" value={form.data_inicio} onChange={e=>setForm(f=>({...f,data_inicio:e.target.value}))}/></div>
                <div><label className="text-sm text-slate-400 mb-1.5 block">Data Fim</label><input type="date" value={form.data_fim} onChange={e=>setForm(f=>({...f,data_fim:e.target.value}))}/></div>
              </div>
              <p className="text-xs text-slate-500">
                {form.objetivo === 'Preparação para competição' ? 'A IA irá gerar 12 semanas: Base Geral → Força Específica → Pico → Afinamento. Foco em performance máxima no dia da competição.' :
                 form.objetivo === 'Hipertrofia' ? 'A IA irá gerar 8 semanas: Acumulação → Intensificação → Pico de Volume → Deload. Alto volume para hipertrofia.' :
                 form.objetivo === 'Deload/Recuperação' ? 'A IA irá gerar 4 semanas de recuperação ativa com retorno gradual ao treinamento normal.' :
                 form.objetivo === 'Preparação para Open' ? 'A IA irá gerar 12 semanas: Base Metcon → Foco Técnico → Simulação Open → Afinamento. Foco em WODs estilo Open.' :
                 'A IA irá gerar 12 semanas: Adaptação → Resistência Muscular → Força Base → Recuperação. Construção sólida de fundamentos.'}
              </p>
              <div className="flex gap-3 mt-2">
                <button onClick={() => setShowModal(false)} className="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 hover:text-white transition-colors">Cancelar</button>
                <button onClick={criar} className="flex-1 btn-primary py-2.5 rounded-xl">Criar com IA</button>
              </div>
            </div>
          </Modal>

          {/* Treinos Sugeridos por Semana */}
          {periodo && (
            <div className="card p-6">
              <div className="flex items-center gap-2 mb-4">
                <Icon name="auto_awesome" className="text-primary" size={20}/>
                <h3 className="font-display font-bold text-lg">Treinos Sugeridos por Semana</h3>
              </div>
              <p className="text-xs text-slate-400 mb-4">Expanda uma semana para ver sugestões de WODs e gerar treinos para cada dia.</p>
              <div className="space-y-2">
                {(periodo.semanas || []).map((sem, idx) => {
                  const isExpanded = semanaExpandida === idx;
                  const dataIni = new Date(periodo.data_inicio);
                  dataIni.setDate(dataIni.getDate() + idx * 7);
                  const diasSem = [];
                  for (let d = 0; d < 7; d++) {
                    const dt = new Date(dataIni); dt.setDate(dt.getDate() + d);
                    const dateStr = dt.toISOString().split('T')[0];
                    diasSem.push({date: dateStr, dia: diasSemana[dt.getDay()], treino: treinosDoPeriodo.find(t => t.data_treino === dateStr)});
                  }
                  return (
                    <div key={idx} className="border border-white/5 rounded-xl overflow-hidden">
                      <button onClick={()=>setSemanaExpandida(isExpanded ? null : idx)}
                        className="w-full flex items-center gap-3 p-3 hover:bg-primary/5 transition-colors text-left">
                        <Icon name={isExpanded?'expand_less':'expand_more'} className="text-slate-400" size={20}/>
                        <div className="flex-1 min-w-0">
                          <p className="font-bold text-sm">Semana {idx+1} — {sem.fase}</p>
                          <p className="text-xs text-slate-500 truncate">{sem.foco_semana || 'Sem descrição'}</p>
                        </div>
                        <span className="tag tag-green text-xs">Vol {sem.volume}%</span>
                        <span className="tag tag-yellow text-xs">Int {sem.intensidade}%</span>
                        {sem.deload && <span className="tag tag-blue text-xs">Deload</span>}
                      </button>
                      {isExpanded && (
                        <div className="p-4 border-t border-white/5 bg-bg-dark/30 space-y-4">
                          {/* Dias da semana com treinos */}
                          <div>
                            <h4 className="text-xs font-bold text-slate-400 uppercase mb-2">Treinos da Semana</h4>
                            <div className="grid grid-cols-1 gap-2">
                              {diasSem.filter(d => new Date(d.date).getDay() !== 0).map(({date, dia, treino}) => (
                                <div key={date} className="flex items-center gap-3 p-3 rounded-lg bg-white/2 border border-white/5">
                                  <span className="font-bold text-xs w-10 text-primary">{dia}</span>
                                  <span className="text-xs text-slate-500 w-20">{new Date(date).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</span>
                                  {treino ? (
                                    <>
                                      <span className="flex-1 text-sm font-medium">{treino.nome}</span>
                                      <button onClick={()=>{ window.__treinoEdicao = treino; window.__modoEdicao = true; setPage && setPage('gerar'); }}
                                        className="text-xs text-primary font-bold hover:underline">Editar</button>
                                      <button onClick={()=>criarTreinoDoDia(date, sem)} className="text-xs text-slate-400 hover:text-primary">Regenerar</button>
                                    </>
                                  ) : (
                                    <>
                                      <span className="flex-1 text-sm text-slate-500 italic">Sem treino</span>
                                      <button onClick={()=>criarTreinoDoDia(date, sem)} className="btn-primary px-3 py-1 rounded-md text-xs flex items-center gap-1">
                                        <Icon name="auto_awesome" size={12}/>Gerar
                                      </button>
                                    </>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Modal editar Semana */}
          {editSemana && (
            <Modal open={!!editSemana} onClose={()=>setEditSemana(null)} title={`Editar Semana ${editSemana.idx+1}`}>
              <div className="space-y-4">
                <div><label className="text-sm text-slate-400 mb-1.5 block">Foco da Semana</label>
                  <input value={editSemana.foco_semana||''} onChange={e=>setEditSemana(s=>({...s,foco_semana:e.target.value}))} placeholder="Ex: Base aeróbia, foco em técnica..."/>
                </div>
                <div><label className="text-sm text-slate-400 mb-1.5 block">Fase</label>
                  <input value={editSemana.fase||''} onChange={e=>setEditSemana(s=>({...s,fase:e.target.value}))}/>
                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-1.5 block">Volume: <span className="text-primary font-bold">{editSemana.volume||0}%</span></label>
                  <input type="range" min="0" max="100" value={editSemana.volume||0} onChange={e=>setEditSemana(s=>({...s,volume:parseInt(e.target.value)}))}
                    style={{padding:0, height:8}}/>
                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-1.5 block">Intensidade: <span className="text-orange-400 font-bold">{editSemana.intensidade||0}%</span></label>
                  <input type="range" min="0" max="100" value={editSemana.intensidade||0} onChange={e=>setEditSemana(s=>({...s,intensidade:parseInt(e.target.value)}))}
                    style={{padding:0, height:8}}/>
                </div>
                <label className="flex items-center gap-3 p-3 rounded-lg border border-white/5 cursor-pointer">
                  <input type="checkbox" checked={!!editSemana.deload} onChange={e=>setEditSemana(s=>({...s,deload:e.target.checked}))} className="w-4 h-4 accent-primary"/>
                  <span className="text-sm">Semana de Deload</span>
                </label>
                <div className="flex gap-3 mt-2">
                  <button onClick={()=>setEditSemana(null)} className="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 hover:text-white transition-colors">Cancelar</button>
                  <button onClick={async ()=>{
                    const {idx, ...changes} = editSemana;
                    await atualizarSemana(idx, changes);
                    setEditSemana(null);
                  }} className="flex-1 btn-primary py-2.5 rounded-xl">Salvar Semana</button>
                </div>
              </div>
            </Modal>
          )}

          {/* Modal Importar Periodização */}
          <Modal open={showImport} onClose={()=>setShowImport(false)} title="Importar Periodização Própria">
            <div className="space-y-4">
              <div className="p-3 rounded-lg bg-blue-500/10 border border-blue-500/20 text-xs text-blue-300">
                <Icon name="info" size={14} className="inline mr-1.5"/>
                Cole sua periodização. Use uma linha por semana começando com "Semana 1:", "Sem 1:" ou "S1:". A IA lerá e disponibilizará para análise.
              </div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Nome da Periodização</label>
                <input value={importForm.nome} onChange={e=>setImportForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Minha Periodização 2026 Q1"/>
              </div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Data de Início</label>
                <input type="date" value={importForm.data_inicio} onChange={e=>setImportForm(f=>({...f,data_inicio:e.target.value}))}/>
              </div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Texto da Periodização</label>
                <textarea value={importForm.texto} onChange={e=>setImportForm(f=>({...f,texto:e.target.value}))}
                  placeholder={"Exemplo:\nSemana 1: Base geral — volume 70, intensidade 60\nSemana 2: Construção aeróbia — volume 75, intensidade 65\nSemana 3: Força base — volume 80, intensidade 70\nSemana 4: Deload — volume 50, intensidade 50\n..."}
                  rows={12} style={{resize:'vertical', fontFamily:'monospace', fontSize:'12px'}}/>
              </div>
              <div className="flex gap-3 mt-2">
                <button onClick={()=>setShowImport(false)} className="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 hover:text-white transition-colors">Cancelar</button>
                <button onClick={importarPeriodizacao} className="flex-1 btn-primary py-2.5 rounded-xl">Importar</button>
              </div>
            </div>
          </Modal>
        </div>
      );

    // ─── Segurança ─────────────────────────────────────────────────────────────
    const Seguranca = ({ toast, filtro }) => {
      const [alertas, setAlertas] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        sb.from('alertas_seguranca').select('*, treinos(nome,data_treino)').eq('academia_id', ACADEMIA_ID)
          .order('created_at', {ascending:false})
          .then(({data}) => { setAlertas(data||[]); setLoading(false); });
      }, []);

      const resolver = async (id) => {
        await sb.from('alertas_seguranca').update({resolvido:true}).eq('id',id);
        setAlertas(prev => prev.map(a => a.id===id ? {...a,resolvido:true} : a));
        toast('Alerta marcado como resolvido.','success');
      };

      const grupos_risco = [
        {nome:'Ombros',nivel:85,cor:'bg-red-500'},{nome:'Lombar',nivel:72,cor:'bg-red-400'},
        {nome:'Joelhos',nivel:45,cor:'bg-yellow-500'},{nome:'Core',nivel:38,cor:'bg-primary'},
        {nome:'Quadris',nivel:30,cor:'bg-primary'},{nome:'Tornozelos',nivel:22,cor:'bg-primary'},
      ];

      if (loading) return <Loading/>;
      return (
        <div className="p-8 space-y-6 fade-in">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-2">
            {[

              {[

    // ─── Cadastro de Focos de Sessão ────────────────────────────────────────────
    // ─── Admin: Reset e Recuperação ───────────────────────────────────────
    const Admin = ({ toast }) => {
      const LS_KEY = 'iacoach_backups';
      const [backups, setBackups] = useState(() => {
        try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; }
      });
      const [showReset, setShowReset] = useState(false);
      const [showBackup, setShowBackup] = useState(false);
      const [backupNome, setBackupNome] = useState('');
      const [alvos, setAlvos] = useState({
        turmas: true, alunos: true, treinos: true, equipamentos: true,
        focos: true, periodizacoes: true, alertas: true,
      });

      const salvarBackups = (lista) => {
        setBackups(lista);
        try { localStorage.setItem(LS_KEY, JSON.stringify(lista)); } catch {}
      };

      const criarBackup = async (nomeCustom) => {
        // Coleta estado atual de tudo
        const [{data:treinosDB},{data:periodDB},{data:alertsDB}] = await Promise.all([
          sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID),
          sb.from('periodizacoes').select('*').eq('academia_id', ACADEMIA_ID),
          sb.from('alertas_seguranca').select('*').eq('academia_id', ACADEMIA_ID),
        ]);
        const snap = {
          id: 'bkp-' + Date.now(),
          nome: nomeCustom || `Backup ${new Date().toLocaleString('pt-BR')}`,
          data: new Date().toISOString(),
          dados: {
            TURMAS: JSON.parse(JSON.stringify(TURMAS)),
            ALUNOS: JSON.parse(JSON.stringify(ALUNOS)),
            FOCOS_SESSAO: JSON.parse(JSON.stringify(FOCOS_SESSAO)),
            ESTOQUE_EQUIPAMENTOS: JSON.parse(JSON.stringify(ESTOQUE_EQUIPAMENTOS)),
            treinos: treinosDB || [],
            periodizacoes: periodDB || [],
            alertas: alertsDB || [],
          },
        };
        salvarBackups([snap, ...backups]);
        return snap;
      };

      const executarBackupManual = async () => {
        const snap = await criarBackup(backupNome || null);
        setShowBackup(false);
        setBackupNome('');
        toast(`Backup "${snap.nome}" criado com sucesso!`, 'success');
      };

      const executarReset = async () => {
        // Sempre criar um backup automático antes do reset
        await criarBackup(`Auto-reset ${new Date().toLocaleString('pt-BR')}`);

        if (alvos.turmas) TURMAS = [];
        if (alvos.alunos) ALUNOS = [];
        if (alvos.focos) FOCOS_SESSAO = [];
        if (alvos.equipamentos) ESTOQUE_EQUIPAMENTOS = {};
        if (alvos.treinos) {
          try { await sb.from('treinos').delete().eq('academia_id', ACADEMIA_ID); } catch {}
        }
        if (alvos.periodizacoes) {
          try { await sb.from('periodizacoes').delete().eq('academia_id', ACADEMIA_ID); } catch {}
        }
        if (alvos.alertas) {
          try { await sb.from('alertas_seguranca').delete().eq('academia_id', ACADEMIA_ID); } catch {}
        }
        setShowReset(false);
        toast('Reset executado! Backup automático salvo antes do reset.', 'success');
        setTimeout(() => window.location.reload(), 1500);
      };

      const restaurar = async (bkp) => {
        if (!confirm(`Restaurar backup "${bkp.nome}"? Os dados atuais serão sobrescritos.`)) return;
        // Restaura em memória
        TURMAS = JSON.parse(JSON.stringify(bkp.dados.TURMAS || []));
        ALUNOS = JSON.parse(JSON.stringify(bkp.dados.ALUNOS || []));
        FOCOS_SESSAO = JSON.parse(JSON.stringify(bkp.dados.FOCOS_SESSAO || []));
        ESTOQUE_EQUIPAMENTOS = JSON.parse(JSON.stringify(bkp.dados.ESTOQUE_EQUIPAMENTOS || {}));
        // Restaura no banco
        try {
          if (bkp.dados.treinos?.length) {
            await sb.from('treinos').delete().eq('academia_id', ACADEMIA_ID);
            await sb.from('treinos').insert(bkp.dados.treinos.map(t => { const {id,...rest} = t; return rest; }));
          }
        } catch {}
        toast(`Backup "${bkp.nome}" restaurado!`, 'success');
        setTimeout(() => window.location.reload(), 1500);
      };

      const removerBackup = (id) => {
        if (!confirm('Remover este backup permanentemente?')) return;
        salvarBackups(backups.filter(b => b.id !== id));
        toast('Backup removido');
      };

      const exportarBackup = (bkp) => {
        const blob = new Blob([JSON.stringify(bkp, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${bkp.nome.replace(/[^a-z0-9]/gi,'_')}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importarArquivo = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const bkp = JSON.parse(ev.target.result);
            if (!bkp.dados) throw new Error('Arquivo inválido');
            salvarBackups([{...bkp, id: 'bkp-' + Date.now(), importado: true}, ...backups]);
            toast('Backup importado com sucesso!');
          } catch (err) {
            toast('Arquivo de backup inválido', 'error');
          }
        };
        reader.readAsText(file);
      };

      const alvosLabels = {
        turmas: 'Turmas',
        alunos: 'Alunos',
        treinos: 'Treinos gerados',
        equipamentos: 'Equipamentos',
        focos: 'Focos de Sessão',
        periodizacoes: 'Periodizações',
        alertas: 'Alertas de Segurança',
      };

      return (
        <div className="p-8 space-y-6 fade-in max-w-5xl">
          {/* Cabeçalho */}
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center">
              <Icon name="admin_panel_settings" className="text-red-400" size={26}/>
            </div>
            <div>
              <h2 className="font-display font-bold text-xl">Área de Administração</h2>
              <p className="text-slate-400 text-sm mt-0.5">Reset do sistema, backups e recuperação de dados</p>
            </div>
          </div>

          {/* Aviso */}
          <div className="card-ai p-5 border border-yellow-500/20 bg-yellow-500/5">
            <div className="flex items-start gap-3">
              <Icon name="warning" className="text-yellow-400 shrink-0" size={22}/>
              <div className="text-sm text-slate-300">
                <p className="font-bold mb-1">Atenção: Operações Críticas</p>
                <p className="text-slate-400 text-xs">Antes de qualquer reset, um backup automático é criado. Você sempre pode restaurar o estado anterior usando a lista de backups abaixo. Backups ficam salvos localmente no navegador.</p>
              </div>
            </div>
          </div>

          {/* Ações principais */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button onClick={()=>setShowBackup(true)} className="card p-5 text-left hover:border-primary/30 transition-all">
              <div className="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center mb-3">
                <Icon name="save" className="text-primary" size={22}/>
              </div>
              <h4 className="font-display font-bold mb-1">Criar Backup Manual</h4>
              <p className="text-xs text-slate-400">Salve um ponto de recuperação com todos os dados atuais.</p>
            </button>

            <label className="card p-5 text-left hover:border-primary/30 transition-all cursor-pointer">
              <div className="w-11 h-11 rounded-xl bg-blue-500/10 flex items-center justify-center mb-3">
                <Icon name="upload_file" className="text-blue-400" size={22}/>
              </div>
              <h4 className="font-display font-bold mb-1">Importar Backup</h4>
              <p className="text-xs text-slate-400">Importe um arquivo .json de backup salvo anteriormente.</p>
              <input type="file" accept=".json" onChange={importarArquivo} className="hidden"/>
            </label>

            <button onClick={()=>setShowReset(true)} className="card p-5 text-left hover:border-red-500/30 transition-all">
              <div className="w-11 h-11 rounded-xl bg-red-500/10 flex items-center justify-center mb-3">
                <Icon name="delete_forever" className="text-red-400" size={22}/>
              </div>
              <h4 className="font-display font-bold mb-1">Reset do Sistema</h4>
              <p className="text-xs text-slate-400">Limpe dados selecionados para começar uma academia do zero.</p>
            </button>
          </div>

          {/* Lista de backups */}
          <div className="card p-5">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-display font-bold text-lg">Histórico de Backups</h3>
              <span className="text-xs text-slate-400">{backups.length} backup{backups.length!==1?'s':''}</span>
            </div>
            {backups.length === 0 ? (
              <div className="py-12 text-center">
                <Icon name="history" className="text-primary/20" size={48}/>
                <p className="text-slate-400 text-sm mt-3">Nenhum backup salvo ainda</p>
                <p className="text-slate-500 text-xs mt-1">Crie seu primeiro backup antes de fazer alterações críticas</p>
              </div>
            ) : (
              <div className="space-y-2">
                {backups.map(bkp => (
                  <div key={bkp.id} className="flex items-center gap-3 p-3 rounded-xl border border-white/5 hover:border-primary/20 transition-all">
                    <div className="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center shrink-0">
                      <Icon name={bkp.importado?'upload':'history'} className="text-primary" size={18}/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="font-bold text-sm truncate">{bkp.nome}</p>
                      <p className="text-xs text-slate-400">{new Date(bkp.data).toLocaleString('pt-BR')} · {(bkp.dados?.treinos?.length||0)} treinos · {(bkp.dados?.TURMAS?.length||0)} turmas · {(bkp.dados?.ALUNOS?.length||0)} alunos</p>
                    </div>
                    <div className="flex gap-1 shrink-0">
                      <button onClick={()=>restaurar(bkp)} className="p-2 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-colors" title="Restaurar">
                        <Icon name="restore" size={18}/>
                      </button>
                      <button onClick={()=>exportarBackup(bkp)} className="p-2 rounded-lg hover:bg-blue-500/10 text-slate-400 hover:text-blue-400 transition-colors" title="Exportar">
                        <Icon name="download" size={18}/>
                      </button>
                      <button onClick={()=>removerBackup(bkp.id)} className="p-2 rounded-lg hover:bg-red-500/10 text-slate-400 hover:text-red-400 transition-colors" title="Remover">
                        <Icon name="delete" size={18}/>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Modal Backup Manual */}

    // ─── Cadastro de Equipamentos ──────────────────────────────────────────

      const atualizar = (id, valor) => {
        const qtd = parseInt(valor) || 0;
        setEstoque(prev => ({...prev, [id]: qtd}));
        setDirty(true);

        setEstoque(prev => ({...prev, [id]: prev[id] && prev[id] > 0 ? 0 : 1}));
        setDirty(true);

        const { error } = await ctx.saveEstoque(estoque);

        if (categoriaAtiva !== 'todas' && eq.categoria !== categoriaAtiva) return false;

        return true;

                  <Icon name={cat.icone} size={14}/>{cat.nome}

            const items = equipFiltrados.filter(eq => eq.categoria === cat.id);
            if (items.length === 0) return null;
            return (
              <div key={cat.id} className="card p-5">
                <div className="flex items-center gap-2 mb-4 pb-3 border-b border-white/5">

                    <button onClick={()=>remover(foco.id)} className="p-1.5 rounded-lg hover:bg-red-500/10 text-slate-400 hover:text-red-400 transition-colors"><Icon name="delete" size={16}/></button>

            </div>

                <input value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Força Funcional"/>
              </div>
              <div><label className="text-sm text-slate-400 mb-1.5 block">Descrição</label>
                <textarea value={form.descricao} onChange={e=>setForm(f=>({...f,descricao:e.target.value}))} placeholder="Descreva o que este foco de sessão trabalha..." rows={3} style={{resize:'none'}}/>

              <div>
                <label className="text-sm text-slate-400 mb-2 block">Ícone</label>

                        {alunosDaTurma.slice(0,5).map(a => (

                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </>)}

          {/* Lista de Alunos */}
          {tab === 'alunos' && (
            <div className="card overflow-hidden">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-white/5">
                    <th className="text-left p-4 text-xs font-bold text-slate-500 uppercase">Aluno</th>

                </thead>
                <tbody>
                  {alunos.map(aluno => {
                    const turma = turmas.find(t => t.id === aluno.turma_id);
                    const nivelColor = aluno.nivel==='avançado'?'tag-green':aluno.nivel==='intermediário'?'tag-yellow':'tag-blue';
                    return (
                      <tr key={aluno.id} className="border-b border-white/5 hover:bg-white/2 transition-colors">
                        <td className="p-4">
                          <div className="flex items-center gap-3">

                        <td className="p-4"><span className={`tag ${nivelColor}`}>{aluno.nivel}</span></td>

                        <td className="p-4 text-right">

                            <button onClick={()=>{setTab('alunos');abrirEditar(aluno);}} className="p-1.5 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-colors"><Icon name="edit" size={16}/></button>
                            <button onClick={()=>removerAluno(aluno.id)} className="p-1.5 rounded-lg hover:bg-red-500/10 text-slate-400 hover:text-red-400 transition-colors"><Icon name="delete" size={16}/></button>

              {alunos.length === 0 && (
                <div className="p-12 text-center">

          {/* Modal de Criação/Edição */}
          <Modal open={showModal} onClose={()=>setShowModal(false)} title={editItem ? `Editar ${tab==='turmas'?'Turma':'Aluno'}` : `Nova ${tab==='turmas'?'Turma':'Aluno'}`}>
            {tab === 'turmas' ? (
              <div className="space-y-4">
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Modalidade</label>
                  <div className="grid grid-cols-3 gap-2">
                    {[{v:'crossfit',l:'CrossFit',i:'fitness_center'},{v:'hyrox',l:'Hyrox',i:'timer'},{v:'bootcamp',l:'Bootcamp',i:'groups'}].map(({v,l,i})=>(
                      <button key={v} type="button" onClick={()=>setFormTurma(f=>({...f,modalidade:v}))}

                  <div><label className="text-sm text-slate-400 mb-1.5 block">Horário</label>
                    <input type="time" value={formTurma.horario} onChange={e=>setFormTurma(f=>({...f,horario:e.target.value}))}/>

                  <div><label className="text-sm text-slate-400 mb-1.5 block">Máx. Alunos</label>
                    <input type="number" value={formTurma.max_alunos} onChange={e=>setFormTurma(f=>({...f,max_alunos:parseInt(e.target.value)||0}))}/>

                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-2 block">Dias da Semana</label>
                  <div className="flex flex-wrap gap-2">
                    {diasOpcoes.map(d=>(
                      <button key={d} type="button" onClick={()=>setFormTurma(f=>({...f,dias:f.dias.includes(d)?f.dias.filter(x=>x!==d):[...f.dias,d]}))}
                        className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${formTurma.dias.includes(d)?'border-primary bg-primary/15 text-primary':'border-white/10 text-slate-400'}`}>
                        {d}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="text-sm text-slate-400 mb-1.5 block">Cor</label>
                  <div className="flex gap-2">
                    {['#43f320','#60a5fa','#facc15','#f87171','#c084fc','#fb923c','#2dd4bf','#f472b6'].map(c=>(
                      <button key={c} type="button" onClick={()=>setFormTurma(f=>({...f,cor:c}))}
                        className={`w-8 h-8 rounded-full border-2 transition-all ${formTurma.cor===c?'border-white scale-110':'border-transparent'}`}
                        style={{background:c}}/>
