    // Função para verificar se equipamento está disponível
    const temEquip = (equipamentos, needed) => {
      if (!needed || needed.length === 0) return true;
      return needed.every(e => {
        const found = equipamentos.find(eq => eq.nome.toLowerCase().includes(e.toLowerCase()));
        return found && found.quantidade > 0;
      });
    };

    // Filtrar movimentos por equipamento disponível
    const filtrarPorEquip = (movs, equipamentos) => {
      if (!equipamentos || equipamentos.length === 0) return movs;
      return movs.filter(m => temEquip(equipamentos, m.equip));
    };

    // Filtrar movimentos por restrições
    const filtrarPorRestricoes = (movs, restricoes) => {
      if (!restricoes || restricoes.trim() === '') return movs;
      const rest = restricoes.toLowerCase();
      return movs.filter(m => !rest.includes(m.nome.toLowerCase()));
    };

    // Gerar WOD inteligente
    const gerarWodInteligente = (foco, numAlunos, equipamentos, restricoes, modoDuplas) => {
      const allG = filtrarPorRestricoes(filtrarPorEquip(MOVIMENTOS.ginastica, equipamentos), restricoes);
      const allW = filtrarPorRestricoes(filtrarPorEquip(MOVIMENTOS.levantamento, equipamentos), restricoes);
      const allM = filtrarPorRestricoes(filtrarPorEquip(MOVIMENTOS.monoestrutural, equipamentos), restricoes);

      const pick = (arr, n) => {
        const shuffled = [...arr].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, n);
      };

      const repsOpts = {
        ginastica: [8,10,12,15,20,30],
        levantamento: [5,7,9,10,12,15,21],
        monoestrutural: [1],
      };

      let movimentos = [];
      let formato, rounds, tempo;
      const nomes = [];

      const focoConfig = {
        'LPO + Condicionamento': {g:1, w:2, m:1, formatos:['AMRAP','For Time','RFT'], tempoRange:[12,18]},
        'Ginástica': {g:3, w:0, m:1, formatos:['AMRAP','EMOM','For Time'], tempoRange:[14,20]},
        'Resistência': {g:1, w:1, m:2, formatos:['AMRAP','For Time','Chipper'], tempoRange:[18,25]},
        'Força Pura': {g:0, w:3, m:0, formatos:['For Time','RFT','EMOM'], tempoRange:[10,16]},
        'Cardio': {g:1, w:1, m:3, formatos:['AMRAP','For Time','Chipper','EMOM'], tempoRange:[15,25]},
        'Mobilidade + Técnica': {g:2, w:1, m:1, formatos:['AMRAP','EMOM'], tempoRange:[12,16]},
      };

      const cfg = focoConfig[foco] || focoConfig['LPO + Condicionamento'];
      formato = cfg.formatos[Math.floor(Math.random() * cfg.formatos.length)];
      tempo = cfg.tempoRange[0] + Math.floor(Math.random() * (cfg.tempoRange[1] - cfg.tempoRange[0] + 1));

      if (cfg.g > 0 && allG.length > 0) {
        pick(allG, cfg.g).forEach(m => {
          const reps = repsOpts.ginastica[Math.floor(Math.random() * repsOpts.ginastica.length)];
          movimentos.push({nome: m.nome, reps, carga: '', modalidade: 'ginastica'});
          nomes.push(m.nome);
        });
      }
      if (cfg.w > 0 && allW.length > 0) {
        pick(allW, cfg.w).forEach(m => {
          const reps = repsOpts.levantamento[Math.floor(Math.random() * repsOpts.levantamento.length)];
          movimentos.push({nome: m.nome, reps, carga: m.rx_m ? `${m.rx_m}/${m.rx_f}` : '', modalidade: 'levantamento'});
          nomes.push(m.nome);
        });
      }
      if (cfg.m > 0 && allM.length > 0) {
        pick(allM, cfg.m).forEach(m => {
          movimentos.push({nome: m.nome, reps: 1, carga: '', modalidade: 'monoestrutural'});
          nomes.push(m.nome);
        });
      }

      // Calcular se equipamento suporta todos os alunos
      const barrasNeeded = movimentos.filter(m => {
        const orig = [...MOVIMENTOS.levantamento, ...MOVIMENTOS.ginastica, ...MOVIMENTOS.monoestrutural]
          .find(o => o.nome === m.nome);
        return orig && orig.equip.includes('barra');
      }).length;
      const barrasDisp = equipamentos.find(e => e.nome.toLowerCase().includes('barra'))?.quantidade || 999;
      const efetivo = modoDuplas ? Math.ceil(numAlunos / 2) : numAlunos;

      let logisticaNota = '';
      if (barrasNeeded > 0 && barrasDisp < efetivo) {
        logisticaNota = `Atenção: ${barrasDisp} barras para ${efetivo} ${modoDuplas?'duplas':'alunos'}. Considere rotação por estações.`;
      }

      // Gerar nome do WOD
      const wodNomes = ['Tempestade','Forja','Trovão','Máquina Verde','Ignição','Fênix','Vulcão','Titânio','Vendaval','Motor','Aço','Centelha','Turbo','Impacto','Arsenal'];
      const wodNome = wodNomes[Math.floor(Math.random() * wodNomes.length)];

      let formatoStr;
      if (formato === 'AMRAP') formatoStr = `AMRAP ${tempo} min`;
      else if (formato === 'For Time') formatoStr = `For Time (TC ${tempo} min)`;
      else if (formato === 'RFT') { rounds = [3,4,5][Math.floor(Math.random()*3)]; formatoStr = `${rounds} Rounds For Time`; }
      else if (formato === 'EMOM') formatoStr = `EMOM ${tempo} min`;
      else if (formato === 'Chipper') formatoStr = `Chipper (For Time)`;
      else formatoStr = formato;

      return {
        nome: wodNome,
        formato: formatoStr,
        movimentos,
        tempo_wod_min: tempo,
        logistica_nota: logisticaNota,
      };

          <h1 className="font-display font-bold text-2xl leading-tight">{title}</h1>
          {subtitle && <p className="text-slate-400 text-sm mt-0.5">{subtitle}</p>}
        </div>
        <div className="flex items-center gap-3">
          {/* Filtro Global */}
          {filtro !== undefined && (
            <div className="flex items-center gap-2">
              <select value={filtro.tipo} onChange={e => {
                const tipo = e.target.value;
                setFiltro({tipo, id: tipo === 'todos' ? null : tipo === 'turma' ? TURMAS[0]?.id : ALUNOS[0]?.id});
              }} className="text-xs font-bold" style={{width:'auto',padding:'6px 10px',minWidth:'80px'}}>
                <option value="todos">Todos</option>
                <option value="turma">Por Turma</option>
                <option value="aluno">Por Aluno</option>
              </select>
              {filtro.tipo === 'turma' && (
                <select value={filtro.id||''} onChange={e=>setFiltro({...filtro,id:e.target.value})} className="text-xs" style={{width:'auto',padding:'6px 10px',minWidth:'120px'}}>
                  {TURMAS.map(t=><option key={t.id} value={t.id}>{t.nome}</option>)}
                </select>
              )}
              {filtro.tipo === 'aluno' && (
                <select value={filtro.id||''} onChange={e=>setFiltro({...filtro,id:e.target.value})} className="text-xs" style={{width:'auto',padding:'6px 10px',minWidth:'120px'}}>
                  {ALUNOS.map(a=><option key={a.id} value={a.id}>{a.nome}</option>)}
                </select>
              )}
              {filtro.tipo !== 'todos' && (
                <button onClick={()=>setFiltro({tipo:'todos',id:null})} className="text-xs text-primary font-bold hover:underline">Limpar</button>
              )}
            </div>
          )}
          {alertCount > 0 && (
            <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
              <Icon name="warning" size={16}/>{alertCount} alerta{alertCount>1?'s':''}
            </div>
          )}
          {actions}
          <button onClick={toggleTheme} className="theme-toggle" title={theme === 'dark' ? 'Mudar para modo claro' : 'Mudar para modo escuro'}>
            <Icon name={theme === 'dark' ? 'light_mode' : 'dark_mode'} size={20} className={theme === 'dark' ? 'text-yellow-400' : 'text-slate-600'}/>
          </button>
        </div>
      </header>
    );

    // ─── Dashboard Head Coach ──────────────────────────────────────────────────
    const DashboardCoach = ({ setPage, toast, filtro }) => {
      const [treinosDB, setTreinosDB] = useState([]);
      const [alertas, setAlertas] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('semana');
      const [treinoAcao, setTreinoAcao] = useState(null); // {treino, date}
      const [weekOffset, setWeekOffset] = useState(0);

      useEffect(() => {
        const load = async () => {
          const [{ data: t }, { data: a }] = await Promise.all([
            sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID).order('data_treino', { ascending: false }).limit(30),
            sb.from('alertas_seguranca').select('*').eq('academia_id', ACADEMIA_ID).eq('resolvido', false),
          ]);
          setTreinosDB(t || []);
          setAlertas(a || []);
          setLoading(false);
        };
        load();
      }, []);

      // Usar apenas dados reais do Supabase
      const treinos = useMemo(() => {
        return [...(treinosDB||[])].sort((a,b) => a.data_treino > b.data_treino ? 1 : -1);
      }, [treinosDB, filtro]);

      const treino_hoje = treinos.find(t => t.data_treino === hoje());

      // Gerar dias do calendário
      const calendarDays = useMemo(() => {
        if (viewMode === 'semana') {
          return Array.from({length:7}, (_,i) => {
            const d = new Date();
            d.setDate(d.getDate() - d.getDay() + i + (weekOffset * 7));
            const dateStr = d.toISOString().split('T')[0];
            return { dia: diasSemana[d.getDay()], date: dateStr, fullDate: d, treino: treinos.find(t => t.data_treino === dateStr) };
          });
        } else {
          const ref = new Date();
          ref.setMonth(ref.getMonth() + weekOffset);
          const year = ref.getFullYear();
          const month = ref.getMonth();
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const days = [];
          for (let i = 0; i < firstDay; i++) days.push(null);
          for (let i = 1; i <= daysInMonth; i++) {
            const d = new Date(year, month, i);
            const dateStr = d.toISOString().split('T')[0];
            days.push({ dia: diasSemana[d.getDay()], date: dateStr, fullDate: d, treino: treinos.find(t => t.data_treino === dateStr), dayNum: i });
          }
          return days;
        }
      }, [treinos, viewMode, weekOffset]);

      const calendarLabel = useMemo(() => {
        if (viewMode === 'semana') {
          const start = calendarDays[0];
          const end = calendarDays[6];
          if (!start || !end) return '';
          return `${new Date(start.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} — ${new Date(end.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}`;
        } else {
          const ref = new Date(); ref.setMonth(ref.getMonth() + weekOffset);
          return ref.toLocaleDateString('pt-BR', {month:'long', year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
        }
      }, [calendarDays, viewMode, weekOffset]);

      if (loading) return <Loading/>;
      return (
        <div className="p-8 space-y-6 fade-in">
          {/* Alerta banner */}
          {alertas.length > 0 && (
            <div className="flex items-start gap-4 p-4 rounded-xl bg-red-500/8 border border-red-500/20">
              <div className="w-10 h-10 rounded-lg bg-red-500 flex items-center justify-center shrink-0">
                <Icon name="warning" className="text-white" size={20}/>
              </div>
              <div className="flex-1">
                <p className="text-red-400 font-bold text-sm uppercase tracking-wide">Alerta de Segurança IA</p>
                <p className="text-slate-300 text-sm mt-1">{alertas[0].descricao}</p>
              </div>
              <button onClick={() => setPage('seguranca')} className="shrink-0 px-3 py-1.5 bg-red-500 text-white rounded-lg text-xs font-bold">
                Ver Detalhes
              </button>
            </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* WOD Hoje */}
            <div className="lg:col-span-2">
              {treino_hoje ? (
                <div className="card-ai p-6 h-full">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="tag tag-green">Treino de Hoje</span>
                    <span className="text-slate-400 text-xs">{fmtDate(treino_hoje.data_treino)}</span>
                  </div>
                  <h2 className="font-display font-bold text-3xl mb-4">{treino_hoje.nome || 'WOD do Dia'}</h2>
                  <div className="grid grid-cols-4 gap-3 mb-5 py-4 border-y border-white/5">
                    {[
                      {l:'Intensidade', v:treino_hoje.intensidade||'—', c:'text-primary'},
                      {l:'Duração', v:`${treino_hoje.tempo_previsto_min||'—'} min`},
                      {l:'Metodologia', v:metLabels[treino_hoje.metodologia]||'—'},
                      {l:'Alunos', v:treino_hoje.num_alunos||'—'},
                    ].map(({l,v,c}) => (
                      <div key={l}>
                        <p className="text-xs text-slate-500 uppercase font-bold tracking-tighter">{l}</p>
                        <p className={`font-bold mt-0.5 ${c||''}`}>{v}</p>
                      </div>
                    ))}
                  </div>
                  {treino_hoje.wod && (
                    <div className="space-y-2 mb-4">
                      <p className="text-sm font-bold text-primary">{treino_hoje.wod.formato}</p>
                      {(treino_hoje.wod.movimentos||[]).slice(0,4).map((m,i) => (
                        <div key={i} className="flex items-center gap-3 text-sm">
                          <span className="text-2xl font-display font-bold text-primary/30 w-8">{m.reps}</span>
                          <span className="font-medium">{m.nome}</span>
                          {m.carga && <span className="text-slate-500">{m.carga}</span>}
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="flex gap-3">
                    <button onClick={() => { window.__treinoEdicao = treino_hoje; setPage('gerar'); }} className="btn-primary px-5 py-2.5 rounded-xl text-sm">Ver Treino Completo</button>
                    <button onClick={() => { window.__treinoEdicao = treino_hoje; window.__modoEdicao = true; setPage('gerar'); }} className="btn-ghost px-5 py-2.5 rounded-xl text-sm">Editar WOD</button>
                  </div>
                </div>
              ) : (
                <div className="card-ai p-8 h-full flex flex-col items-center justify-center text-center">
                  <Icon name="fitness_center" className="text-primary/30" size={48}/>
                  <h3 className="font-display font-bold text-xl mt-4 mb-2">{treinos.length === 0 ? 'Nenhum treino cadastrado ainda' : 'Nenhum treino para hoje'}</h3>
                  <p className="text-slate-400 text-sm mb-5 max-w-sm">{treinos.length === 0 ? 'Comece cadastrando seus equipamentos e gere seu primeiro treino com IA.' : 'Gere um novo treino para hoje ou selecione um WOD clássico.'}</p>
                  <div className="flex gap-3 flex-wrap justify-center">
                    <button onClick={() => setPage('gerar')} className="btn-primary px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm">
                      <Icon name="auto_awesome" size={18}/>Gerar Treino IA
                    </button>
                    {treinos.length === 0 && (
                      <button onClick={() => setPage('equipamentos')} className="btn-ghost px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm">
                        <Icon name="inventory_2" size={18}/>Cadastrar Equipamentos
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>

            {/* Stats — apenas métricas relevantes de treinos */}
            <div className="space-y-4">
              {[
                {l:'Treinos Este Mês', v: treinos.filter(t=> { const d=new Date(t.data_treino); const n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }).length, i:'calendar_month'},
                {l:'Treinos Esta Semana', v: treinos.filter(t=> { const d=new Date(t.data_treino); const n=new Date(); const diff=(n-d)/(1000*60*60*24); return diff>=0 && diff<=7; }).length, i:'date_range'},
                {l:'Turmas Cadastradas', v: TURMAS.length, i:'groups'},
                {l:'Focos Ativos', v: FOCOS_SESSAO.filter(f=>f.ativo).length, i:'category'},
              ].map(({l,v,i}) => (
                <div key={l} className="card p-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-lg bg-primary/10 flex items-center justify-center">
                      <Icon name={i} className="text-primary" size={18}/>
                    </div>
                    <span className="text-sm font-medium text-slate-300">{l}</span>
                  </div>
                  <span className="font-display font-bold text-primary">{v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Calendário com rolagem */}
          <div>
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-3">
                <h2 className="font-display font-bold text-lg">Calendário</h2>
                <div className="flex rounded-lg border border-white/10 overflow-hidden">
                  <button onClick={()=>{setViewMode('semana');setWeekOffset(0);}} className={`px-3 py-1 text-xs font-bold ${viewMode==='semana'?'bg-primary/20 text-primary':'text-slate-400 hover:text-white'}`}>Semana</button>
                  <button onClick={()=>{setViewMode('mes');setWeekOffset(0);}} className={`px-3 py-1 text-xs font-bold ${viewMode==='mes'?'bg-primary/20 text-primary':'text-slate-400 hover:text-white'}`}>Mês</button>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={()=>setWeekOffset(w=>w-1)} className="p-1.5 rounded-lg border border-white/10 hover:border-primary/30 text-slate-400 hover:text-primary transition-colors"><Icon name="chevron_left" size={18}/></button>
                <span className="text-sm font-medium min-w-[180px] text-center">{calendarLabel}</span>
                <button onClick={()=>setWeekOffset(w=>w+1)} className="p-1.5 rounded-lg border border-white/10 hover:border-primary/30 text-slate-400 hover:text-primary transition-colors"><Icon name="chevron_right" size={18}/></button>
                {weekOffset !== 0 && <button onClick={()=>setWeekOffset(0)} className="text-xs text-primary font-bold ml-1">Hoje</button>}
              </div>
            </div>

            {viewMode === 'mes' && (
              <div className="grid grid-cols-7 gap-1 mb-1">
                {diasSemana.map(d => <div key={d} className="text-center text-xs font-bold text-slate-500 py-1">{d.slice(0,3)}</div>)}
              </div>
            )}

            <div className={`grid gap-${viewMode==='semana'?'3':'1'} ${viewMode==='semana'?'grid-cols-7':'grid-cols-7'}`}>
              {calendarDays.map((item, idx) => {
                if (!item) return <div key={`empty-${idx}`} className="h-16"/>;
                const isToday = item.date === hoje();
                const hasTreino = !!item.treino;
                const onClickDay = () => {
                  if (hasTreino) setTreinoAcao({treino: item.treino, date: item.date});
                  else setPage('gerar');
                };
                if (viewMode === 'mes') {
                  return (
                    <div key={item.date} className={`rounded-lg p-1.5 min-h-[60px] border cursor-pointer transition-all ${isToday?'bg-primary/10 border-primary/40':hasTreino?'card border-transparent hover:border-primary/20':'border-transparent hover:border-white/10'}`}
                      onClick={onClickDay}>
                      <p className={`text-xs font-bold ${isToday?'text-primary':'text-slate-400'}`}>{item.dayNum}</p>
                      {hasTreino && (
                        <div className="mt-1">
                          <p className="text-xs font-bold truncate leading-tight">{item.treino.nome}</p>
                          <div className="flex items-center gap-1 mt-0.5">
                            <div className={`w-1.5 h-1.5 rounded-full ${item.treino.intensidade==='alta'?'bg-red-400':'bg-primary'}`}/>
                            <span className="text-xs text-slate-500 truncate">{item.treino.foco?.split(' ')[0]}</span>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                }
                return (
                  <div key={item.date} className={`rounded-xl p-3 border transition-all cursor-pointer ${isToday ? 'bg-primary/10 border-primary/40' : 'card border-transparent hover:border-primary/20'}`}
                    onClick={onClickDay}>
                    <p className={`text-xs font-bold uppercase text-center mb-2 ${isToday?'text-primary':'text-slate-500'}`}>{item.dia}</p>
                    {hasTreino ? (
                      <div>
                        <p className="text-xs font-bold truncate">{item.treino.nome}</p>
                        <p className="text-xs text-slate-500 mt-1">{metLabels[item.treino.metodologia] || item.treino.foco?.split(' ')[0]}</p>
                        {isToday && <div className="w-1.5 h-1.5 rounded-full bg-primary mx-auto mt-2 pulse-green"/>}
                      </div>
                    ) : (
                      <div className="flex items-center justify-center h-12 opacity-20">
                        <Icon name={isToday?'add_circle':'remove'} size={20}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Modal de ações para treino existente */}
          {treinoAcao && (
            <Modal open={!!treinoAcao} onClose={()=>setTreinoAcao(null)} title={treinoAcao.treino.nome}>
              <div className="space-y-3">
                <p className="text-sm text-slate-400">Data: <span className="font-bold">{new Date(treinoAcao.date).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</span></p>
                <div className="space-y-2">
                  <button onClick={()=>{ window.__treinoEdicao = treinoAcao.treino; setPage('gerar'); setTreinoAcao(null); }}
                    className="w-full flex items-center gap-3 p-3 rounded-xl border border-white/10 hover:border-primary/30 transition-all text-left">
                    <Icon name="visibility" className="text-primary" size={20}/>
                    <div>
                      <p className="font-bold text-sm">Ver treino completo</p>
                      <p className="text-xs text-slate-400">Visualiza todos os detalhes do treino</p>
                    </div>
                  </button>
                  <button onClick={()=>{ window.__treinoEdicao = treinoAcao.treino; window.__modoEdicao = true; setPage('gerar'); setTreinoAcao(null); }}
                    className="w-full flex items-center gap-3 p-3 rounded-xl border border-white/10 hover:border-primary/30 transition-all text-left">
                    <Icon name="edit" className="text-blue-400" size={20}/>
                    <div>
                      <p className="font-bold text-sm">Editar este treino</p>
                      <p className="text-xs text-slate-400">Altere movimentos, reps e cargas</p>
                    </div>
                  </button>
                  <button onClick={async ()=>{
                    if (!confirm('Isso irá substituir o treino atual por um novo gerado. Continuar?')) return;
                    // Chama gerarWodInteligente e atualiza via update
                    const foco = treinoAcao.treino.foco || 'LPO + Condicionamento';
                    const met = treinoAcao.treino.metodologia || 'crossfit';
                    const numAlunos = treinoAcao.treino.num_alunos || 15;
                    const equipDisp = CATALOGO_EQUIPAMENTOS.filter(c => (ESTOQUE_EQUIPAMENTOS[c.id]||0) > 0).map(c => ({id:c.id, nome:c.nome, quantidade:ESTOQUE_EQUIPAMENTOS[c.id]}));
                    const novoWod = gerarWodInteligente(foco, numAlunos, equipDisp, '', false);
                    const aquecOpts = (AQUECIMENTOS[met] || AQUECIMENTOS['crossfit'])[foco] || Object.values(AQUECIMENTOS['crossfit'])[0];
                    const skillOpts = SKILLS[foco] || SKILLS['Força Pura'];
                    const skillBase = skillOpts[Math.floor(Math.random() * skillOpts.length)];
                    const atualizacao = {
                      nome: novoWod.nome,
                      aquecimento: {descricao: aquecOpts[0], duracao_min: 12},
                      skill: {...skillBase, duracao_min: 14},
                      wod: {...novoWod, tempo_wod_min: 20},
                    };
                    await sb.from('treinos').update(atualizacao).eq('id', treinoAcao.treino.id);
                    setTreinoAcao(null);
                    // Recarregar treinos
                    const {data} = await sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID).order('data_treino', {ascending:false}).limit(30);
                    setTreinosDB(data || []);
                    toast('Treino substituído!', 'success');
                  }}
                    className="w-full flex items-center gap-3 p-3 rounded-xl border border-white/10 hover:border-yellow-500/30 transition-all text-left">
                    <Icon name="refresh" className="text-yellow-400" size={20}/>
                    <div>
                      <p className="font-bold text-sm">Substituir por novo</p>
                      <p className="text-xs text-slate-400">Gera um novo treino para esta data</p>
                    </div>
                  </button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    };

    // ─── Gerar Treino ──────────────────────────────────────────────────────────
    // ─── Modal de Detalhes do Exercício ──────────────────────────────────────
    const ExercicioModal = ({ nome, onClose }) => {
      const det = EXERCICIO_DETALHES[nome];
      if (!det) return (
        <Modal open={true} onClose={onClose} title={nome}>
          <div className="text-center py-8">
            <Icon name="fitness_center" className="text-primary/30" size={48}/>
            <p className="text-slate-400 mt-3">Detalhes deste exercício serão adicionados em breve.</p>
          </div>
        </Modal>
      );
      return (
        <Modal open={true} onClose={onClose} title={nome}>
          <div className="space-y-4">
            {/* Imagem do exercício */}
            <div className="w-full rounded-xl overflow-hidden bg-primary/5">
              {det.img ? (
                <img src={det.img} alt={nome} className="w-full h-52 object-cover" onError={(e)=>{e.target.style.display='none';}}/>
              ) : (
                <div className="h-52 flex flex-col items-center justify-center text-primary/30">
                  <Icon name="fitness_center" size={48}/>
                  <span className="text-sm mt-2">{nome}</span>
                </div>
              )}
            </div>

            {/* Descrição de execução */}
            <div className="card p-4">
              <h4 className="font-bold text-sm mb-2 flex items-center gap-2"><Icon name="description" size={16} className="text-primary"/>Como Executar</h4>
              <p className="text-sm text-slate-300 leading-relaxed">{det.desc}</p>
            </div>

            <div className="grid grid-cols-2 gap-3">
              {/* Músculos */}
              <div className="card p-4">
                <h4 className="font-bold text-sm mb-2 flex items-center gap-2"><Icon name="fitness_center" size={16} className="text-primary"/>Músculos Trabalhados</h4>
                <div className="flex flex-wrap gap-1.5">
                  {det.musculos.split(',').map((m,i) => (
                    <span key={i} className="tag tag-green text-xs">{m.trim()}</span>
                  ))}
                </div>
              </div>

              {/* Erros */}
              <div className="card p-4">
                <h4 className="font-bold text-sm mb-2 flex items-center gap-2"><Icon name="warning" size={16} className="text-red-400"/>Erros Comuns</h4>
                <ul className="space-y-1">
                  {det.erros.split(',').map((e,i) => (
                    <li key={i} className="text-xs text-slate-400 flex items-start gap-1.5">
                      <Icon name="close" size={10} className="text-red-400 mt-0.5 shrink-0"/>{e.trim()}
                    </li>
                  ))}
                </ul>
              </div>
            </div>

            {/* Escalas */}
            <div className="card p-4">
              <h4 className="font-bold text-sm mb-2 flex items-center gap-2"><Icon name="tune" size={16} className="text-primary"/>Escala / Substituições</h4>
              <div className="flex flex-wrap gap-1.5">
                {det.escala.split(',').map((s,i) => (
                  <span key={i} className="px-2.5 py-1 rounded-lg bg-primary/10 border border-primary/20 text-xs font-medium text-primary">{s.trim()}</span>
                ))}
              </div>
            </div>

            {/* Link para vídeo */}
            {det.video && (
              <a href={det.video} target="_blank" rel="noopener noreferrer" className="btn-primary w-full py-3 rounded-xl flex items-center justify-center gap-2 text-sm">
                <Icon name="play_circle" size={18}/>Assistir Vídeo de Demonstração
              </a>
            )}
          </div>
        </Modal>
      );
    };

    const GerarTreino = ({ toast, filtro, treinoInicial, dataFixa, onSaved }) => {
      const ctx = useAcademia();
      const [form, setForm] = useState({ metodologia: 'crossfit', data: dataFixa || hoje(), num_alunos: 15, focos: ['LPO + Condicionamento'], foco: 'LPO + Condicionamento', modo_equipe: 'solo', duracao: 55, destino: 'turma', aluno_id: '' });
      const [treino, setTreino] = useState(treinoInicial || null);
      const [loading, setLoading] = useState(false);
      const [saved, setSaved] = useState(!!treinoInicial);
      const [dirty, setDirty] = useState(false);
      const [treinos, setTreinos] = useState([]);
      const [academia, setAcademia] = useState(null);
      const [showList, setShowList] = useState(false);
      const [showBenchmarks, setShowBenchmarks] = useState(false);
      const [editando, setEditando] = useState(false);
      const [exercicioModal, setExercicioModal] = useState(null);

      // Equipamentos derivados do estoque do context
      const equipamentos = useMemo(() => {
        return CATALOGO_EQUIPAMENTOS
          .filter(c => (ctx.estoque[c.id] || 0) > 0)
          .map(c => ({ id: c.id, nome: c.nome, quantidade: ctx.estoque[c.id] }));
      }, [ctx.estoque]);

      useEffect(() => {
        Promise.all([
          sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID).order('data_treino', {ascending:false}).limit(20),
          sb.from('academias').select('*').eq('id', ACADEMIA_ID).single(),
        ]).then(([{data:t},{data:a}]) => {
          setTreinos(t||[]);
          // Prioridade: treinoInicial prop > window.__treinoEdicao > treino mais recente
          if (treinoInicial) {
            setTreino(treinoInicial);
            if (window.__modoEdicao) { setEditando(true); window.__modoEdicao = false; }
          } else if (window.__treinoEdicao) {
            setTreino(window.__treinoEdicao);
            if (window.__modoEdicao) setEditando(true);
            window.__treinoEdicao = null;
            window.__modoEdicao = false;
          } else if (t && t.length) {
            setTreino(t[0]);
          }
          setAcademia(a);
          if(a?.max_alunos_por_aula) setForm(f=>({...f, num_alunos: a.max_alunos_por_aula}));
        });
      }, []);

      // Wrapper de setTreino que marca dirty em modo edição
      const updateTreino = (updater) => {
        setTreino(updater);
        if (editando) setDirty(true);
      };

      const gerar = async () => {
        setLoading(true); setSaved(false); setEditando(false);
        await new Promise(r => setTimeout(r, 800));

        const numAlunos = parseInt(form.num_alunos) || 15;
        const focos = (form.focos && form.focos.length>0) ? form.focos : [form.foco || 'LPO + Condicionamento'];
        const focoPrincipal = focos[0];
        const duracaoAlvo = parseInt(form.duracao) || 55;

        // Restrições vêm dos equipamentos sem estoque + restrições do aluno selecionado
        const equipSemEstoque = equipamentos.filter(e => !e.quantidade || e.quantidade === 0).map(e => e.nome).join(', ');
        const alunoRest = form.destino === 'aluno' && form.aluno_id ? (ALUNOS.find(a=>a.id===form.aluno_id)?.restricoes || '') : '';
        const restricoes = [equipSemEstoque, alunoRest].filter(Boolean).join(', ');

        const cooldownMin = 5;
        const aquecMin = Math.round(duracaoAlvo * 0.2);
        const skillMin = Math.round(duracaoAlvo * 0.25);
        const wodMin = duracaoAlvo - aquecMin - skillMin - cooldownMin;

        const metAquec = AQUECIMENTOS[form.metodologia] || AQUECIMENTOS['crossfit'];
        const aquecOpts = metAquec[focoPrincipal] || metAquec['LPO + Condicionamento'] || Object.values(metAquec)[0];
        const aquecDesc = aquecOpts[Math.floor(Math.random() * aquecOpts.length)];
        const aquecimento = { descricao: aquecDesc, duracao_min: aquecMin };

        // Skill: escolhe de um dos focos selecionados
        const skillFoco = focos[Math.floor(Math.random() * focos.length)];
        const skillOpts = SKILLS[skillFoco] || SKILLS['Força Pura'];
        const skillBase = skillOpts[Math.floor(Math.random() * skillOpts.length)];
        const skill = { ...skillBase, duracao_min: skillMin };

        // WOD: combina focos — gera com o foco principal mas mistura movimentos dos outros
        const modoDuplas = form.modo_equipe === 'duplas' || form.modo_equipe === 'trios' || form.modo_equipe === 'quartetos';
        const tamanhoEquipe = {'solo':1,'duplas':2,'trios':3,'quartetos':4}[form.modo_equipe || 'solo'] || 1;
        const wod = gerarWodInteligente(focoPrincipal, numAlunos, equipamentos, restricoes, modoDuplas);
        wod.tempo_wod_min = wodMin;

        // Se múltiplos focos, adiciona movimentos extras dos outros focos
        if (focos.length > 1) {
          for (let i=1; i<focos.length && i<3; i++) {
            const extraWod = gerarWodInteligente(focos[i], numAlunos, equipamentos, restricoes, modoDuplas);
            if (extraWod.movimentos && extraWod.movimentos.length > 0) {
              wod.movimentos.push(extraWod.movimentos[0]);
            }
          }
        }

        const tempoTotal = aquecMin + skillMin + wodMin + cooldownMin;

        const temLPO = wod.movimentos.some(m => m.modalidade === 'levantamento');
        const temGinastica = wod.movimentos.some(m => m.modalidade === 'ginastica');
        const adaptacoes = {
          iniciante: temLPO
            ? 'Reduza cargas em 30-40%. Substitua Snatch/Clean por versões Power com hang. Use kettlebell se necessário.'
            : temGinastica
            ? 'Substitua Pull-ups por Ring Rows, HSPU por Pike Push-ups, Muscle-ups por Jumping Pull-ups + Dips.'
            : 'Reduza volume em 30% e aumente os períodos de descanso.',
          avancado: temLPO
            ? 'Mantenha RX. Adicione complexo: Squat Clean + Front Squat + Jerk entre rounds.'
            : 'Mantenha RX. Adicione colete de 9kg e aumente reps em 20%.',
        };

        const intensidade = focos.some(f=>f.includes('Força')||f.includes('Resistência')) ? 'alta' : 'media';

        const novo = {
          academia_id: ACADEMIA_ID, criado_por: COACH_ID,
          data_treino: form.data, metodologia: form.metodologia,
          nome: wod.nome, num_alunos: numAlunos,
          foco: focos.join(' + '),
          focos,
          restritcoes: restricoes,
          modo_equipe: form.modo_equipe || 'solo',
          tamanho_equipe: tamanhoEquipe,
          modo_duplas: modoDuplas,
          aquecimento, skill, wod,
          cooldown: { descricao: '3-5 min caminhada leve + Foam Roller (quadríceps, lombar, dorsais) + alongamento estático' },
          adaptacoes, tempo_previsto_min: tempoTotal,
          intensidade, logistica_nota: wod.logistica_nota || '',
          turma_ids: form.destino === 'turma' ? TURMAS.filter(t=>t.modalidade===form.metodologia).map(t=>t.id) : [],
          aluno_id: form.destino === 'aluno' ? form.aluno_id : null,
          aluno_ids: form.destino === 'turma' ? ALUNOS.filter(a => TURMAS.find(t=>t.id===a.turma_id)?.modalidade === form.metodologia).map(a => a.id) : form.aluno_id ? [form.aluno_id] : [],
          status: 'rascunho',
        };
        setTreino(novo); setLoading(false);
        toast(`Treino gerado! Duração: ${tempoTotal} min. Edite e salve.`, 'success');
      };

      // Usar WOD clássico (benchmark)
      const usarBenchmark = (bm) => {
        setSaved(false); setEditando(false); setShowBenchmarks(false);
        const duracaoAlvo = parseInt(form.duracao) || 55;
        const aquecMin = Math.round(duracaoAlvo * 0.2);
        const foco = (form.focos && form.focos[0]) || form.foco || 'LPO + Condicionamento';
        const metAquec = AQUECIMENTOS[form.metodologia] || AQUECIMENTOS['crossfit'];
        const aquecOpts = metAquec[foco] || metAquec['LPO + Condicionamento'] || Object.values(metAquec)[0];
        const aquecDesc = aquecOpts[Math.floor(Math.random() * aquecOpts.length)];
        const cooldownMin = 5;
        const skillMin = Math.max(duracaoAlvo - aquecMin - (bm.tempo_est || 15) - cooldownMin, 8);

        const skillOpts = SKILLS[foco] || SKILLS['Força Pura'];
        const skillBase = skillOpts[Math.floor(Math.random() * skillOpts.length)];

        const novo = {
          academia_id: ACADEMIA_ID, criado_por: COACH_ID,
          data_treino: form.data, metodologia: form.metodologia,
          nome: bm.nome, num_alunos: parseInt(form.num_alunos) || 15,
          foco, restritcoes: '',
          modo_duplas: false,
          aquecimento: { descricao: aquecDesc, duracao_min: aquecMin },
          skill: { ...skillBase, duracao_min: skillMin },
          wod: { nome: bm.nome, formato: bm.formato, movimentos: bm.movimentos, tempo_wod_min: bm.tempo_est },
          cooldown: { descricao: '3-5 min caminhada leve + Foam Roller + alongamento estático' },
          adaptacoes: { iniciante: 'Reduza cargas em 30-40% e substitua movimentos complexos por versões simplificadas.', avancado: 'Mantenha RX. Adicione colete de 9kg se aplicável.' },
          tempo_previsto_min: aquecMin + skillMin + (bm.tempo_est||15) + cooldownMin,
          intensidade: bm.intensidade || 'alta',
          logistica_nota: '', status: 'rascunho',
        };
        setTreino(novo);
        toast(`WOD "${bm.nome}" carregado! Edite conforme necessário.`, 'success');
      };

      // Edição inline dos movimentos do WOD
      const editarMovimento = (idx, campo, valor) => {
        updateTreino(prev => {
          const novosMovs = [...(prev.wod?.movimentos || [])];
          novosMovs[idx] = { ...novosMovs[idx], [campo]: valor };
          return { ...prev, wod: { ...prev.wod, movimentos: novosMovs } };
        });
      };

      const removerMovimento = (idx) => {
        updateTreino(prev => {
          const novosMovs = (prev.wod?.movimentos || []).filter((_,i) => i !== idx);
          return { ...prev, wod: { ...prev.wod, movimentos: novosMovs } };
        });
      };

      const adicionarMovimento = () => {
        updateTreino(prev => ({
          ...prev, wod: { ...prev.wod, movimentos: [...(prev.wod?.movimentos||[]), {nome:'Air Squats', reps:10, carga:'', modalidade:'ginastica'}] }
        }));
      };

      const salvar = async () => {
        if (!treino) return;
        // Se já tem ID (e é UUID válido), fazer UPDATE; senão INSERT
        const temId = treino.id && typeof treino.id === 'string' && treino.id.length > 10 && !treino.id.startsWith('sim-');
        const payload = {...treino};
        delete payload.id;
        delete payload.created_at;
        if (temId) {
          const { data, error } = await sb.from('treinos').update(payload).eq('id', treino.id).select().single();
          if (error) { toast('Erro ao atualizar: ' + error.message, 'error'); return; }
          setSaved(true); setDirty(false); setEditando(false);
          setTreinos(prev => prev.map(t => t.id === data.id ? data : t));
          setTreino(data);
          toast('Treino atualizado!', 'success');
          if (onSaved) onSaved(data);
        } else {
          const { data, error } = await sb.from('treinos').insert([payload]).select().single();
          if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
          setSaved(true); setDirty(false); setEditando(false);
          setTreinos(prev => [data, ...prev]);
          setTreino(data);
          toast('Treino salvo com sucesso!', 'success');
          if (onSaved) onSaved(data);
        }
      };

      // Lista de todos os movimentos para o seletor
      const todosMovimentos = useMemo(() => {
        const all = [];
        MOVIMENTOS.ginastica.forEach(m => all.push({...m, modalidade:'ginastica'}));
        MOVIMENTOS.levantamento.forEach(m => all.push({...m, modalidade:'levantamento'}));
        MOVIMENTOS.monoestrutural.forEach(m => all.push({...m, modalidade:'monoestrutural'}));
        return all;
      }, []);

      return (
        <div className="flex h-full fade-in">
          {/* Config Panel */}
          <div className="w-80 min-w-80 border-r border-white/5 p-6 overflow-y-auto space-y-5">
            <div>
              <h2 className="font-display font-bold text-lg mb-1">Gerador IA</h2>
              <p className="text-slate-400 text-xs">Configure e gere treinos otimizados.</p>
            </div>

            {/* Seção de destino/turmas removida — foco na geração geral do treino */}

            <div>
              <label className="text-sm text-primary font-semibold mb-2 block">Metodologia</label>
              <div className="grid grid-cols-3 gap-2">
                {[{v:'crossfit',l:'CrossFit',i:'fitness_center'},{v:'hyrox',l:'Hyrox',i:'timer'},{v:'bootcamp',l:'Bootcamp',i:'groups'}].map(({v,l,i}) => (
                  <button key={v} onClick={() => setForm(f=>({...f,metodologia:v}))}
                    className={`flex flex-col items-center py-3 rounded-xl border text-xs font-bold transition-all ${form.metodologia===v?'border-primary bg-primary/10 text-primary':'border-white/10 text-slate-400 hover:border-primary/30'}`}>
                    <Icon name={i} size={20} className="mb-1"/>{l}
                  </button>
                ))}
              </div>
            </div>

            {/* Duração do Treino */}
            <div>
              <label className="text-sm font-medium mb-1.5 block">Duração Total <span className="text-primary font-bold">{form.duracao} min</span></label>
              <input type="range" min="40" max="75" value={form.duracao} onChange={e=>setForm(f=>({...f,duracao:parseInt(e.target.value)}))}
                style={{background:'transparent',border:'none',padding:0,width:'100%',accentColor:'var(--primary)'}} className="!border-none !bg-transparent"/>
              <div className="flex justify-between text-xs text-slate-500 mt-1"><span>40 min</span><span>60 min</span><span>75 min</span></div>
            </div>

            {[
              {l:'Data do Treino', k:'data', type:'date', locked: !!dataFixa},
              ...(form.destino !== 'aluno' ? [{l:'Número de Alunos', k:'num_alunos', type:'number', ph:'Ex: 15'}] : []),
            ].map(({l,k,type,ph,locked}) => (
              <div key={k}>
                <label className="text-sm font-medium mb-1.5 block">{l} {locked && <span className="text-xs text-primary ml-1">🔒</span>}</label>
                <input type={type} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph} disabled={locked}/>
              </div>
            ))}

            <div>
              <label className="text-sm font-medium mb-1.5 block">Foco da Sessão <span className="text-xs text-slate-500 font-normal">(seleção múltipla)</span></label>
              <div className="flex flex-wrap gap-1.5">
                {FOCOS_SESSAO.filter(f=>f.ativo).map(f=>{
                  const selected = (form.focos||[]).includes(f.nome);
                  return (
                    <button key={f.id} type="button" onClick={()=>setForm(prev=>{
                      const focos = prev.focos || [];
                      const next = selected ? focos.filter(x=>x!==f.nome) : [...focos, f.nome];
                      return {...prev, focos: next.length>0?next:[f.nome], foco: (next.length>0?next:[f.nome])[0]};
                    })}
                    className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${selected?'border-primary bg-primary/15 text-primary':'border-white/10 text-slate-400 hover:border-primary/30'}`}>
                      {f.nome}
                    </button>
                  );
                })}
              </div>
              {form.focos && form.focos.length > 1 && <p className="text-xs text-slate-500 mt-1.5">IA combinará {form.focos.length} focos no treino gerado.</p>}
            </div>

            {form.destino !== 'aluno' && (
            <div>
              <label className="text-sm font-medium mb-1.5 block">Modo de Treino</label>
              <div className="grid grid-cols-4 gap-1.5">
                {[{v:'solo',l:'Solo',i:'person'},{v:'duplas',l:'Duplas',i:'group'},{v:'trios',l:'Trios',i:'groups_2'},{v:'quartetos',l:'Quartetos',i:'groups_3'}].map(({v,l,i})=>(
                  <button key={v} type="button" onClick={()=>setForm(f=>({...f,modo_equipe:v}))}
                    className={`flex flex-col items-center py-2 rounded-xl border text-xs font-bold transition-all ${(form.modo_equipe||'solo')===v?'border-primary bg-primary/10 text-primary':'border-white/10 text-slate-400 hover:border-primary/30'}`}>
                    <Icon name={i} size={16} className="mb-0.5"/>{l}
                  </button>
                ))}
              </div>
            </div>
            )}

            <div className="grid grid-cols-2 gap-2">
              <button onClick={gerar} disabled={loading} className="btn-primary py-3 rounded-xl flex items-center justify-center gap-1.5 font-display font-bold text-sm">
                {loading ? <div className="loading-spinner" style={{width:16,height:16,borderWidth:2}}/> : <><Icon name="auto_awesome" size={16}/>GERAR</>}
              </button>
              <button onClick={() => setShowBenchmarks(!showBenchmarks)} className="btn-ghost py-3 rounded-xl flex items-center justify-center gap-1.5 text-sm font-bold">
                <Icon name="emoji_events" size={16}/>CLÁSSICOS
              </button>
            </div>

            {/* Benchmarks */}
            {showBenchmarks && (
              <div className="space-y-2">
                <p className="text-xs text-primary font-bold uppercase tracking-wide">WODs Clássicos</p>
                <div className="max-h-64 overflow-y-auto space-y-1.5">
                  {BENCHMARK_WODS.map(bm => (
                    <button key={bm.nome} onClick={() => usarBenchmark(bm)}
                      className="w-full text-left p-3 rounded-lg border border-white/5 hover:border-primary/30 hover:bg-primary/5 transition-all">
                      <div className="flex items-center justify-between">
                        <span className="font-bold text-sm">{bm.nome}</span>
                        <span className={`tag ${bm.intensidade==='alta'?'tag-red':'tag-yellow'}`}>{bm.tempo_est}min</span>
                      </div>
                      <p className="text-xs text-slate-500 mt-0.5">{bm.formato} · {bm.descricao}</p>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Histórico */}
            <div>
              <button onClick={() => setShowList(!showList)} className="text-xs text-slate-400 hover:text-primary flex items-center gap-1 transition-colors">
                <Icon name={showList?'expand_less':'expand_more'} size={16}/>Treinos recentes ({treinos.length})
              </button>
              {showList && (
                <div className="mt-2 space-y-2">
                  {treinos.map(t => (
                    <button key={t.id} onClick={() => { setTreino(t); setSaved(true); setEditando(false); }} className={`w-full text-left p-3 rounded-lg border transition-all text-xs ${treino?.id===t.id?'border-primary/40 bg-primary/5':'border-white/5 hover:border-white/15'}`}>
                      <p className="font-bold truncate">{t.nome}</p>
                      <p className="text-slate-500 mt-0.5">{fmtDate(t.data_treino)} · {metLabels[t.metodologia]}</p>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Result Panel */}
          <div className="flex-1 p-8 overflow-y-auto">
            {loading ? (
              <div className="flex flex-col items-center justify-center h-full gap-4">
                <div className="loading-spinner" style={{width:48,height:48,borderWidth:4}}/>
                <p className="text-slate-400 font-medium">Gerando treino com IA...</p>
              </div>
            ) : treino ? (
              <div className="space-y-5 max-w-2xl">
                <div className="flex items-start justify-between">
                  <div>
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                      <span className="tag tag-green">Resultado IA</span>
                      {treino.turma_ids && treino.turma_ids.length > 0 && <span className="tag tag-blue"><Icon name="groups" size={10} className="inline mr-1"/>{treino.turma_ids.length} turma{treino.turma_ids.length>1?'s':''} de {metLabels[treino.metodologia]}</span>}
                      {treino.turma_id && <span className="tag tag-blue"><Icon name="groups" size={10} className="inline mr-1"/>{TURMAS.find(t=>t.id===treino.turma_id)?.nome?.split('—')[0]?.trim() || 'Turma'}</span>}
                      {treino.aluno_id && <span className="tag tag-yellow"><Icon name="person" size={10} className="inline mr-1"/>{ALUNOS.find(a=>a.id===treino.aluno_id)?.nome || 'Aluno'}</span>}
                    </div>
                    <h2 className="font-display font-bold text-3xl">{treino.nome}</h2>
                    <p className="text-slate-400 text-sm mt-1">{fmtDate(treino.data_treino)} · {metLabels[treino.metodologia]}</p>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => setEditando(!editando)} className={`p-2.5 rounded-lg transition-all ${editando?'btn-primary':'btn-ghost'}`} title={editando?'Sair da edição':'Editar treino'}>
                      <Icon name="edit" size={18}/>
                    </button>
                    <button onClick={gerar} className="btn-ghost p-2.5 rounded-lg" title="Regenerar"><Icon name="refresh" size={18}/></button>
                    {(!saved || dirty) && <button onClick={salvar} className="btn-primary px-5 py-2 rounded-lg flex items-center gap-1.5 text-sm"><Icon name="save" size={16}/>{treino?.id && typeof treino.id === 'string' && treino.id.length > 10 ? 'Atualizar' : 'Salvar'}</button>}
                    {saved && !dirty && <span className="tag tag-green flex items-center gap-1"><Icon name="check" size={14}/>Salvo</span>}
                    {dirty && <span className="tag tag-yellow flex items-center gap-1"><Icon name="edit_note" size={14}/>Alterações não salvas</span>}
                  </div>
                </div>

                {/* Logística */}
                {treino.logistica_nota && (
                  <div className="p-4 rounded-xl bg-yellow-500/10 border border-yellow-500/20 flex items-start gap-3 text-sm text-yellow-300">
                    <Icon name="inventory_2" size={18} className="mt-0.5 shrink-0"/>
                    <div>
                      <p className="font-bold mb-0.5">Nota de Logística</p>
                      <p className="text-yellow-200/80">{treino.logistica_nota}</p>
                    </div>
                  </div>
                )}

                {/* Tempo total */}
                <div className="flex items-center gap-4 flex-wrap">
                  <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-primary/10 border border-primary/20">
                    <Icon name="schedule" size={16} className="text-primary"/>
                    <span className="text-sm font-bold text-primary">{treino.tempo_previsto_min} min total</span>
                  </div>
                  <div className={`tag ${intensidadeColor[treino.intensidade] || 'tag-green'}`}>
                    {treino.intensidade?.toUpperCase()}
                  </div>
                  {treino.num_alunos && treino.num_alunos > 1 && <span className="text-xs text-slate-400"><Icon name="group" size={14} className="inline mr-1"/>{treino.num_alunos} alunos</span>}
                  {treino.aluno_id && <span className="text-xs text-slate-400"><Icon name="person" size={14} className="inline mr-1"/>Treino Individual</span>}
                </div>

                {/* Aquecimento — estruturado como WOD */}
                {treino.aquecimento && (
                  <div className="card-ai p-5">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-2"><Icon name="whatshot" className="text-orange-400" size={22}/><h3 className="font-display font-bold text-lg">Aquecimento / Mobilidade</h3></div>
                      <span className="tag tag-yellow">{treino.aquecimento.duracao_min} min</span>
                    </div>
                    {editando ? (
                      <textarea value={treino.aquecimento.descricao} onChange={e => updateTreino(prev => ({...prev, aquecimento: {...prev.aquecimento, descricao: e.target.value}}))}
                        rows={4} className="text-sm" style={{resize:'vertical'}}/>
                    ) : (
                      <div className="space-y-2">
                        {treino.aquecimento.descricao.split('+').map((parte, i) => {

                          const movNome = Object.keys(EXERCICIO_DETALHES).find(k => p.toLowerCase().includes(k.toLowerCase()));
                          return (

                              {movNome && (
                                <button onClick={()=>setExercicioModal(movNome)} className="shrink-0 p-1.5 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-colors" title="Ver detalhes">
                                  <Icon name="info" size={16}/>
                                </button>
                              )}
                            </div>

                      </div>
                    )}

                )}

                {/* Skill — estruturado com detalhes */}
                {treino.skill && (
                  <div className="card p-5">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2">
                        <Icon name="fitness_center" className="text-primary" size={22}/>
                        <div>
                          <h3 className="font-display font-bold text-lg">Skill: {treino.skill.nome}</h3>
                          {treino.skill.nota && <p className="text-xs text-slate-400 italic">{treino.skill.nota}</p>}
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="tag tag-blue">{treino.skill.duracao_min} min</span>
                        {EXERCICIO_DETALHES[treino.skill.nome] && (
                          <button onClick={()=>setExercicioModal(treino.skill.nome)} className="p-1.5 rounded-lg hover:bg-primary/10 text-slate-400 hover:text-primary transition-colors" title="Ver detalhes e vídeo">
                            <Icon name="play_circle" size={20}/>
                          </button>
                        )}
                      </div>
                    </div>
                    {/* Imagem do skill se disponível */}
                    {EXERCICIO_DETALHES[treino.skill.nome]?.img && (
                      <div className="mb-3 rounded-lg overflow-hidden cursor-pointer" onClick={()=>setExercicioModal(treino.skill.nome)}>
                        <img src={EXERCICIO_DETALHES[treino.skill.nome].img} alt={treino.skill.nome} className="w-full h-32 object-cover opacity-80 hover:opacity-100 transition-opacity" onError={e=>{e.target.style.display='none';}}/>
                      </div>
                    )}
                    {/* Descrição breve */}
                    {EXERCICIO_DETALHES[treino.skill.nome]?.desc && (
                      <p className="text-xs text-slate-400 mb-3 leading-relaxed">{EXERCICIO_DETALHES[treino.skill.nome].desc}</p>
                    )}
                    <div className="grid grid-cols-5 gap-2">
                      {(treino.skill.series||[]).map((s,i) => (
                        <div key={i} className="bg-primary/5 border border-primary/10 rounded-lg p-3 text-center">
                          <p className="text-xs text-slate-400">Série {s.set}</p>
                          <p className="font-bold text-sm">{s.reps}{s.pct ? ` @${s.pct}%` : ''}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* WOD */}
                {treino.wod && (
                  <div className="card-ai p-5 border-2">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-2">
                        <Icon name="timer" className="text-primary" size={24}/>
                        <div>
                          <h3 className="font-display font-bold text-xl">WOD: "{treino.wod.nome}"</h3>
                          <span className="text-primary text-xs font-bold">{treino.wod.formato}</span>
                        </div>
                      </div>
                      <div className="tag tag-green flex items-center gap-1">
                        <Icon name="bolt" size={12}/>~{treino.wod.tempo_wod_min||treino.tempo_previsto_min}min
                      </div>
                    </div>
                    <div className="space-y-3">
                      {(treino.wod.movimentos||[]).map((m,i) => {
                        const modTag = m.modalidade === 'ginastica' ? {l:'G',c:'tag-blue'} : m.modalidade === 'levantamento' ? {l:'W',c:'tag-red'} : m.modalidade === 'monoestrutural' ? {l:'M',c:'tag-yellow'} : null;
                        const temDetalhe = !!EXERCICIO_DETALHES[m.nome];
                        return (
                          <div key={i} className="flex items-center gap-3 border-b border-white/5 pb-3">
                            {editando ? (
                              <>
                                <input type="text" value={m.reps} onChange={e => editarMovimento(i,'reps',e.target.value)}
                                  className="!w-16 text-center font-bold text-sm !p-2"/>
                                <select value={m.nome} onChange={e => {
                                  const found = todosMovimentos.find(mv => mv.nome === e.target.value);
                                  editarMovimento(i,'nome',e.target.value);
                                  if(found) { editarMovimento(i,'modalidade',found.modalidade); if(found.rx_m) editarMovimento(i,'carga',`${found.rx_m}/${found.rx_f}`); }
                                }} className="flex-1 text-sm !p-2">
                                  {todosMovimentos.map(mv => <option key={mv.nome} value={mv.nome}>{mv.nome}</option>)}
                                </select>
                                <input type="text" value={m.carga||''} onChange={e => editarMovimento(i,'carga',e.target.value)}
                                  placeholder="Carga" className="!w-24 text-sm !p-2"/>
                                <button onClick={() => removerMovimento(i)} className="text-red-400 hover:text-red-300 p-1"><Icon name="close" size={16}/></button>
                              </>
                            ) : (
                              <>
                                <span className="font-display font-bold text-3xl text-primary/25 w-12">{m.reps}</span>
                                <div className="flex-1">
                                  <div className="flex items-center gap-2">
                                    <p className="font-bold">{m.nome}</p>
                                    {temDetalhe && (
                                      <button onClick={() => setExercicioModal(m.nome)} className="text-primary/50 hover:text-primary transition-colors" title="Ver detalhes do exercício">
                                        <Icon name="info" size={16}/>
                                      </button>
                                    )}
                                  </div>
                                  {m.carga && <p className="text-xs text-slate-400">{m.carga}</p>}
                                </div>
                                {modTag && <span className={`tag ${modTag.c}`}>{modTag.l}</span>}
                              </>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {editando && (
                      <button onClick={adicionarMovimento} className="mt-3 w-full py-2 rounded-lg border border-dashed border-primary/30 text-primary text-sm font-bold hover:bg-primary/5 transition-colors flex items-center justify-center gap-1">
                        <Icon name="add" size={16}/>Adicionar Movimento
                      </button>
                    )}
                    {treino.modo_equipe && treino.modo_equipe !== 'solo' && (
                      <div className="mt-4 p-3 rounded-lg bg-blue-500/10 border border-blue-500/20 flex items-center gap-2 text-sm text-blue-300">
                        <Icon name="group" size={16}/>Adaptado para <span className="font-bold capitalize">{treino.modo_equipe}</span> — equipes de {treino.tamanho_equipe||2}, alternar movimentos por rodada
                      </div>
                    )}
                    {!treino.modo_equipe && treino.modo_duplas && (
                      <div className="mt-4 p-3 rounded-lg bg-blue-500/10 border border-blue-500/20 flex items-center gap-2 text-sm text-blue-300">
                        <Icon name="group" size={16}/>Adaptado para duplas — alternar movimentos por rodada
                      </div>
                    )}
                  </div>
                )}

                {/* Cooldown + Adaptações */}
                <div className="grid grid-cols-2 gap-4">
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="self_improvement" className="text-primary" size={18}/><h3 className="font-bold text-sm">Volta à Calma</h3></div>
                    {editando ? (
                      <textarea value={treino.cooldown?.descricao||''} onChange={e => updateTreino(prev => ({...prev, cooldown: {...prev.cooldown, descricao: e.target.value}}))}
                        rows={3} className="text-xs" style={{resize:'vertical'}}/>
                    ) : (
                      <p className="text-xs text-slate-400">{treino.cooldown?.descricao}</p>
                    )}
                  </div>
                  <div className="card p-5">
                    <div className="flex items-center gap-2 mb-3"><Icon name="tune" className="text-primary" size={18}/><h3 className="font-bold text-sm">Adaptações</h3></div>
                    <p className="text-xs text-slate-400 mb-1"><span className="text-slate-200 font-bold">Iniciante:</span> {treino.adaptacoes?.iniciante}</p>
                    <p className="text-xs text-slate-400"><span className="text-slate-200 font-bold">Avançado:</span> {treino.adaptacoes?.avancado}</p>
                  </div>
                {/* Análise IA — justificativa do treino */}
                <div className="card-ai p-5 relative overflow-hidden">
                  <div className="absolute -right-8 -top-8 w-32 h-32 bg-primary/5 rounded-full blur-2xl"/>
                  <div className="flex items-center gap-2 mb-3 relative">
                    <Icon name="psychology" className="text-primary" size={20}/>
                    <h3 className="font-display font-bold">Análise IA — Por que este treino?</h3>
                  </div>
                  <div className="space-y-2 relative text-sm">
                    {treino.aluno_id && (() => {
                      const al = ALUNOS.find(a=>a.id===treino.aluno_id);
                      return al ? (
                        <div className="p-3 rounded-lg bg-primary/5 border border-primary/10 space-y-1.5">
                          <p><Icon name="person" size={14} className="text-primary inline mr-1.5"/>Treino personalizado para <span className="font-bold text-primary">{al.nome}</span></p>
                          <p className="text-slate-400 text-xs">Nível: <span className="font-bold">{al.nivel}</span> · Objetivo: <span className="font-bold">{al.objetivo}</span></p>
                          {al.restricoes && <p className="text-red-400 text-xs"><Icon name="warning" size={12} className="inline mr-1"/>Restrições aplicadas: {al.restricoes}</p>}
                          <p className="text-slate-400 text-xs">{al.nivel==='iniciante'?'Cargas e complexidade reduzidas para construção de base técnica segura.':al.nivel==='avançado'?'Intensidade e complexidade maximizadas para desenvolvimento de performance.':'Volume e carga equilibrados para progressão consistente.'}</p>
                        </div>
                      ) : null;
                    })()}
                    {treino.turma_ids && treino.turma_ids.length > 0 && (() => {
                      const turmasDoTreino = TURMAS.filter(t => treino.turma_ids.includes(t.id));
                      return (
                        <div className="p-3 rounded-lg bg-primary/5 border border-primary/10 space-y-1.5">
                          <p><Icon name="groups" size={14} className="text-primary inline mr-1.5"/>Treino para <span className="font-bold text-primary">todas as {turmasDoTreino.length} turmas de {metLabels[treino.metodologia]}</span></p>
                          <div className="flex flex-wrap gap-1 mt-1">
                            {turmasDoTreino.map(t => <span key={t.id} className="text-xs px-2 py-0.5 rounded-md bg-primary/10 text-primary">{t.horario} ({t.dias?.join('/')})</span>)}
                          </div>
                          <p className="text-slate-400 text-xs mt-1">Logística otimizada com equipamentos disponíveis da academia.</p>
                        </div>
                      );
                    })()}
                    <ul className="space-y-1.5 text-slate-400 text-xs mt-2">
                      <li className="flex items-start gap-2"><Icon name="check_circle" size={14} className="text-primary shrink-0 mt-0.5"/>Foco da sessão: <span className="font-bold text-slate-300">{treino.foco}</span> — movimentos selecionados para atender este objetivo.</li>
                      <li className="flex items-start gap-2"><Icon name="check_circle" size={14} className="text-primary shrink-0 mt-0.5"/>Duração total de <span className="font-bold text-slate-300">{treino.tempo_previsto_min} min</span> distribuídos entre aquecimento ({treino.aquecimento?.duracao_min}min), skill ({treino.skill?.duracao_min}min), WOD e volta à calma.</li>
                      <li className="flex items-start gap-2"><Icon name="check_circle" size={14} className="text-primary shrink-0 mt-0.5"/>Distribuição modal: {treino.wod?.movimentos?.filter(m=>m.modalidade==='ginastica').length||0} ginástica, {treino.wod?.movimentos?.filter(m=>m.modalidade==='levantamento').length||0} levantamento, {treino.wod?.movimentos?.filter(m=>m.modalidade==='monoestrutural').length||0} monoestrutural.</li>
                      {treino.logistica_nota && <li className="flex items-start gap-2 text-yellow-400"><Icon name="warning" size={14} className="shrink-0 mt-0.5"/>{treino.logistica_nota}</li>}
                    </ul>
                  </div>
                </div>

                </div>
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center h-full gap-3 text-center">
                <Icon name="auto_awesome" className="text-primary/20" size={64}/>
                <h3 className="font-display font-bold text-xl">Configure e gere seu treino</h3>
                <p className="text-slate-400 text-sm max-w-xs">Ajuste os parâmetros no painel à esquerda e clique em "Gerar" ou escolha um WOD clássico</p>
              </div>
            )}
          </div>

          {/* Modal de exercício */}
          {exercicioModal && <ExercicioModal nome={exercicioModal} onClose={() => setExercicioModal(null)}/>}
        </div>
      );
    };

    // ─── Análise de Programação ────────────────────────────────────────────────
    // Função para extrair movimentos de um treino e classificá-los
    const extrairMovimentos = (treino) => {
      const movs = [];
      if (treino.wod?.movimentos) {
        treino.wod.movimentos.forEach(m => {
          movs.push({ nome: m.nome, reps: m.reps || 0, modalidade: m.modalidade || 'desconhecido' });
        });
      }
      if (treino.skill?.nome) {
        const totalReps = (treino.skill.series || []).reduce((sum, s) => sum + (parseInt(s.reps) || 0), 0);
        movs.push({ nome: treino.skill.nome, reps: totalReps, modalidade: 'levantamento' });
      }
      return movs;
    };

    // Classificar movimento por grupo muscular
    const getGrupo = (nomeMovimento) => {
      const n = nomeMovimento.toLowerCase();
      const allMovs = [...MOVIMENTOS.ginastica, ...MOVIMENTOS.levantamento, ...MOVIMENTOS.monoestrutural];
      const found = allMovs.find(m => n.includes(m.nome.toLowerCase()) || m.nome.toLowerCase().includes(n));
      return found?.grupo || 'cardio';
    };

    const Analise = ({ toast, filtro }) => {
      const [treinosRaw, setTreinosRaw] = useState([]);
      const [loading, setLoading] = useState(true);
      // Período padrão: últimos 30 dias
      const hoje30 = () => { const d = new Date(); d.setDate(d.getDate() - 30); return d.toISOString().split('T')[0]; };
      const [periodo, setPeriodo] = useState({ inicio: hoje30(), fim: hoje() });
      const [periodoPreset, setPeriodoPreset] = useState('30d');

      const aplicarPreset = (preset) => {
        setPeriodoPreset(preset);
        const d = new Date();
        const ini = new Date();
        if (preset === '7d') ini.setDate(d.getDate() - 7);
        else if (preset === '30d') ini.setDate(d.getDate() - 30);
        else if (preset === '90d') ini.setDate(d.getDate() - 90);
        else if (preset === 'mes') { ini.setDate(1); }
        else if (preset === 'ano') { ini.setMonth(0); ini.setDate(1); }
        else if (preset === 'tudo') { ini.setFullYear(2020); }
        setPeriodo({ inicio: ini.toISOString().split('T')[0], fim: d.toISOString().split('T')[0] });
      };

      useEffect(() => {
        sb.from('treinos').select('*').eq('academia_id', ACADEMIA_ID).order('data_treino', {ascending:false})
          .then(({data}) => {
            setTreinosRaw(data || []);
            setLoading(false);
          });
      }, []);

      // Aplicar filtro + período
      const treinos = useMemo(() => {
        let all = treinosRaw;
        if (filtro?.tipo === 'turma' && filtro.id) all = all.filter(t => t.turma_id === filtro.id || (t.turma_ids && t.turma_ids.includes(filtro.id)));
        else if (filtro?.tipo === 'aluno' && filtro.id) all = all.filter(t => t.aluno_ids && t.aluno_ids.includes(filtro.id));
        // Filtro por período
        all = all.filter(t => {
          if (!t.data_treino) return false;
          return t.data_treino >= periodo.inicio && t.data_treino <= periodo.fim;
        });
        return all;
      }, [treinosRaw, filtro, periodo]);

      // Calcular estatísticas reais dos treinos
      const stats = useMemo(() => {
        if (!treinos.length) return null;

        // Frequência de movimentos
        const movCount = {};
        const modalCount = { ginastica: 0, levantamento: 0, monoestrutural: 0 };
        const grupoCount = { puxar: 0, empurrar: 0, pernas: 0, core: 0, cardio: 0, lpo: 0 };
        const repsTotal = {};
        const treinosPorDia = {};

        treinos.forEach(t => {
          const movs = extrairMovimentos(t);
          movs.forEach(m => {
            movCount[m.nome] = (movCount[m.nome] || 0) + 1;
            repsTotal[m.nome] = (repsTotal[m.nome] || 0) + (m.reps || 0);
            if (modalCount[m.modalidade] !== undefined) modalCount[m.modalidade]++;
            const grupo = getGrupo(m.nome);
            if (grupoCount[grupo] !== undefined) grupoCount[grupo]++;
          });
          if (t.data_treino) {
            const dia = new Date(t.data_treino).getDay();
            treinosPorDia[dia] = (treinosPorDia[dia] || 0) + 1;
          }
        });

        // Top movimentos por frequência
        const movFreq = Object.entries(movCount)
          .map(([nome, count]) => ({ nome, count, repsTotal: repsTotal[nome] || 0 }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 10);

        // Distribuição modalidades (%)
        const totalModal = Object.values(modalCount).reduce((s, v) => s + v, 0) || 1;
        const modalDist = {
          ginastica: Math.round((modalCount.ginastica / totalModal) * 100),
          levantamento: Math.round((modalCount.levantamento / totalModal) * 100),
          monoestrutural: Math.round((modalCount.monoestrutural / totalModal) * 100),
        };

        // Distribuição grupos musculares (% relativo ao max)
        const totalGrupo = Object.values(grupoCount).reduce((s, v) => s + v, 0) || 1;
        const grupoDist = Object.entries(grupoCount)
          .map(([l, v]) => ({ l: l.charAt(0).toUpperCase() + l.slice(1), v: Math.round((v / totalGrupo) * 100) }))
          .sort((a, b) => b.v - a.v);

        // Volume por dia da semana
        const volumeSemanal = diasSemana.map((_, i) => treinosPorDia[i] || 0);

        // Gerar insights automáticos
        const fraquezas = [];
        const sugestoes = [];

        // Desbalanceamento puxar/empurrar
        if (grupoCount.empurrar > grupoCount.puxar * 1.5) {
          fraquezas.push(`Desbalanceamento: ${grupoCount.empurrar} movimentos de empurrar vs ${grupoCount.puxar} de puxar. Risco de lesão no ombro.`);
          sugestoes.push('Adicione mais Pull-ups, Ring Rows ou Bent-over Rows para equilibrar empurrar/puxar.');
        } else if (grupoCount.puxar > grupoCount.empurrar * 1.5) {
          fraquezas.push(`Volume alto de puxada (${grupoCount.puxar}x) comparado a empurrar (${grupoCount.empurrar}x).`);
          sugestoes.push('Adicione Push Press, HSPU ou Push-ups para equilibrar.');
        }

        // Falta de LPO
        if (grupoCount.lpo < 2 && treinos.length >= 5) {
          fraquezas.push(`Apenas ${grupoCount.lpo} sessão(ões) com Levantamento de Peso Olímpico nos últimos ${treinos.length} treinos.`);
          sugestoes.push('Inclua sessões de Snatch ou Clean & Jerk pelo menos 2x por semana para desenvolvimento técnico.');
        }

        // Falta de core
        if (grupoCount.core < 2 && treinos.length >= 5) {
          fraquezas.push(`Trabalho de core sub-representado: apenas ${grupoCount.core} ocorrência(s).`);
          sugestoes.push('Adicione Toes-to-Bar, GHD Sit-ups ou Turkish Get-ups ao skill ou aquecimento.');
        }

        // Falta de monoestrutural
        if (modalDist.monoestrutural < 15) {
          fraquezas.push(`Condicionamento monoestrutural em apenas ${modalDist.monoestrutural}% dos movimentos. Capacidade aeróbia pode estagnar.`);
          sugestoes.push('Adicione corrida, remo ou bike em pelo menos 1 WOD por semana como monoestrutural puro.');
        }

        // Volume excessivo de pernas
        if (grupoDist[0]?.l === 'Pernas' && grupoDist[0]?.v > 40) {
          fraquezas.push(`Pernas concentram ${grupoDist[0].v}% do volume total. Risco de fadiga acumulada.`);
          sugestoes.push('Distribua melhor entre dias com Upper Body focus e Lower Body focus.');
        }

        // Se sem treinos suficientes
        if (treinos.length < 3 && fraquezas.length === 0) {
          fraquezas.push('Dados insuficientes para análise completa. Continue adicionando treinos para insights mais precisos.');
          sugestoes.push('Gere e salve pelo menos 5 treinos para que a IA possa analisar padrões e tendências.');
        }

        return { movFreq, modalDist, grupoDist, volumeSemanal, fraquezas, sugestoes, totalTreinos: treinos.length, repsTotal };
      }, [treinos]);

      if (loading) return <Loading/>;

      const s = stats || { movFreq: [], modalDist: {ginastica:33,levantamento:33,monoestrutural:34}, grupoDist: [], volumeSemanal: [0,0,0,0,0,0,0], fraquezas: [], sugestoes: [], totalTreinos: 0 };
      const maxCount = Math.max(...s.movFreq.map(m => m.count), 1);
      const maxG = Math.max(...s.grupoDist.map(g => g.v), 1);
      const maxVol = Math.max(...s.volumeSemanal, 1);

      return (
        <div className="p-8 space-y-6 fade-in">
          {/* Filtro de Período */}
          <div className="card p-5">
            <div className="flex items-center gap-2 mb-4">
              <Icon name="date_range" className="text-primary" size={20}/>
              <h3 className="font-display font-bold">Período de Análise</h3>
            </div>
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex items-center gap-1.5 flex-wrap">
                {[
                  {v:'7d',l:'7 dias'},
                  {v:'30d',l:'30 dias'},
                  {v:'90d',l:'90 dias'},
                  {v:'mes',l:'Este mês'},
                  {v:'ano',l:'Este ano'},
                  {v:'tudo',l:'Todos'},
                ].map(({v,l})=>(
                  <button key={v} onClick={()=>aplicarPreset(v)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${periodoPreset===v?'border-primary bg-primary/10 text-primary':'border-white/10 text-slate-400 hover:border-primary/30'}`}>
                    {l}
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-2 ml-auto flex-wrap">
                <input type="date" value={periodo.inicio} onChange={e=>{setPeriodo(p=>({...p,inicio:e.target.value}));setPeriodoPreset('custom');}} style={{width:'auto',padding:'6px 10px'}} className="text-xs"/>
                <span className="text-xs text-slate-500">até</span>
